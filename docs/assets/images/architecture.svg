<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540">
  <defs>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea" />
      <stop offset="100%" style="stop-color:#764ba2" />
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#2563eb" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <linearGradient id="grad-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899" />
      <stop offset="100%" style="stop-color:#db2777" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="450" y="36" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" fill="#334155" text-anchor="middle" font-weight="700">How Mudra Studio Works</text>

  <!-- ==================== ROW 1: AI GENERATION ==================== -->

  <!-- User / Prompt -->
  <rect x="40" y="60" width="170" height="90" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="80" cy="90" r="16" fill="url(#grad-purple)" opacity="0.9"/>
  <text x="80" y="95" font-family="'Segoe UI',sans-serif" font-size="16" fill="#fff" text-anchor="middle">You</text>
  <text x="135" y="93" font-family="'Segoe UI',sans-serif" font-size="13" fill="#334155" font-weight="600">Describe</text>
  <text x="125" y="112" font-family="'Segoe UI',sans-serif" font-size="11" fill="#64748b">"Build me a drum</text>
  <text x="125" y="126" font-family="'Segoe UI',sans-serif" font-size="11" fill="#64748b">machine with taps"</text>

  <!-- Arrow: User -> AI Skill -->
  <line x1="210" y1="105" x2="280" y2="105" stroke="#667eea" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <defs><marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#667eea"/></marker></defs>

  <!-- AI Skill (Claude / Gemini) -->
  <rect x="280" y="60" width="200" height="90" rx="14" fill="url(#grad-purple)" filter="url(#shadow)"/>
  <text x="380" y="90" font-family="'Segoe UI',sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">AI Skill</text>
  <text x="380" y="110" font-family="'Segoe UI',sans-serif" font-size="11" fill="#e0d4f7" text-anchor="middle">Claude Code  /  Gemini Gem</text>
  <text x="380" y="128" font-family="'Segoe UI',sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">infer signals + pick template + generate</text>

  <!-- Arrow: AI Skill -> HTML App -->
  <line x1="480" y1="105" x2="550" y2="105" stroke="#667eea" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="515" y="97" font-family="'Segoe UI',sans-serif" font-size="9" fill="#667eea" text-anchor="middle">generates</text>

  <!-- HTML App File -->
  <rect x="550" y="60" width="170" height="90" rx="14" fill="#fff" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="635" y="93" font-family="'Segoe UI',sans-serif" font-size="14" fill="#334155" text-anchor="middle" font-weight="700">HTML App</text>
  <text x="635" y="113" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">preview/drum-machine.html</text>
  <text x="635" y="130" font-family="'Segoe UI',sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">single self-contained file</text>

  <!-- Arrow: HTML -> Browser -->
  <line x1="720" y1="105" x2="790" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <text x="755" y="97" font-family="'Segoe UI',sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">open</text>

  <!-- Browser icon -->
  <rect x="790" y="72" width="68" height="56" rx="10" fill="url(#grad-blue)" filter="url(#shadow)"/>
  <text x="824" y="98" font-family="'Segoe UI',sans-serif" font-size="22" fill="#fff" text-anchor="middle">&#127760;</text>
  <text x="824" y="118" font-family="'Segoe UI',sans-serif" font-size="8" fill="#bfdbfe" text-anchor="middle">Browser</text>

  <!-- ==================== DIVIDER ==================== -->
  <line x1="40" y1="178" x2="860" y2="178" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="450" y="196" font-family="'Segoe UI',sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Runtime — what happens when the app is open</text>

  <!-- ==================== ROW 2: RUNTIME ARCHITECTURE ==================== -->

  <!-- Mudra Band -->
  <rect x="40" y="220" width="180" height="140" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="238" width="140" height="44" rx="22" fill="url(#grad-green)"/>
  <text x="130" y="265" font-family="'Segoe UI',sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">Mudra Band</text>
  <!-- Signal icons row -->
  <text x="62" y="306" font-family="'Segoe UI',sans-serif" font-size="9" fill="#64748b">Gestures</text>
  <text x="120" y="306" font-family="'Segoe UI',sans-serif" font-size="9" fill="#64748b">Pressure</text>
  <text x="174" y="306" font-family="'Segoe UI',sans-serif" font-size="9" fill="#64748b">IMU</text>
  <text x="62" y="322" font-family="'Segoe UI',sans-serif" font-size="9" fill="#64748b">Motion</text>
  <text x="120" y="322" font-family="'Segoe UI',sans-serif" font-size="9" fill="#64748b">SNC</text>
  <text x="174" y="322" font-family="'Segoe UI',sans-serif" font-size="9" fill="#64748b">Battery</text>
  <!-- small dots for signals -->
  <circle cx="56" cy="300" r="3" fill="#10b981"/><circle cx="114" cy="300" r="3" fill="#f59e0b"/>
  <circle cx="168" cy="300" r="3" fill="#3b82f6"/><circle cx="56" cy="316" r="3" fill="#8b5cf6"/>
  <circle cx="114" cy="316" r="3" fill="#ec4899"/><circle cx="168" cy="316" r="3" fill="#6b7280"/>
  <text x="130" y="350" font-family="'Segoe UI',sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">wrist wearable</text>

  <!-- WebSocket Connection (Band -> App) -->
  <line x1="220" y1="275" x2="350" y2="275" stroke="#10b981" stroke-width="2.5" stroke-dasharray="8,4" filter="url(#glow)"/>
  <line x1="220" y1="295" x2="350" y2="295" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker></defs>
  <!-- Protocol label -->
  <rect x="235" y="246" width="120" height="22" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="295" y="261" font-family="monospace" font-size="9" fill="#059669" text-anchor="middle">ws://127.0.0.1:8766</text>
  <text x="295" y="312" font-family="'Segoe UI',sans-serif" font-size="8" fill="#6b7280" text-anchor="middle">subscribe / signal data</text>

  <!-- Your App (center) -->
  <rect x="350" y="220" width="240" height="270" rx="16" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <!-- App header -->
  <rect x="350" y="220" width="240" height="40" rx="16 16 0 0" fill="url(#grad-blue)"/>
  <text x="470" y="245" font-family="'Segoe UI',sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">Your Mudra App</text>

  <!-- Connection indicator -->
  <circle cx="372" y="272" r="5" fill="#10b981"/>
  <text x="384" y="275" font-family="'Segoe UI',sans-serif" font-size="9" fill="#10b981">Connected</text>

  <!-- App content area -->
  <rect x="366" y="286" width="208" height="80" rx="8" fill="#f1f5f9"/>
  <text x="470" y="310" font-family="'Segoe UI',sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="600">App Content</text>
  <text x="470" y="328" font-family="'Segoe UI',sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">game / tool / dashboard</text>
  <text x="470" y="344" font-family="'Segoe UI',sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">responds to signals</text>

  <!-- Telemetry HUD -->
  <rect x="366" y="374" width="208" height="24" rx="4" fill="#1e293b"/>
  <text x="375" y="390" font-family="monospace" font-size="8" fill="#38bdf8">gesture:tap</text>
  <text x="442" y="390" font-family="monospace" font-size="8" fill="#fbbf24">pressure:72%</text>
  <text x="520" y="390" font-family="monospace" font-size="8" fill="#a78bfa">dir:left</text>
  <text x="470" y="410" font-family="'Segoe UI',sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Telemetry HUD</text>

  <!-- Simulator panel -->
  <rect x="366" y="418" width="208" height="38" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="374" y="426" width="30" height="18" rx="4" fill="#e2e8f0"/><text x="389" y="438" font-family="'Segoe UI',sans-serif" font-size="7" fill="#475569" text-anchor="middle">Tap</text>
  <rect x="408" y="426" width="34" height="18" rx="4" fill="#e2e8f0"/><text x="425" y="438" font-family="'Segoe UI',sans-serif" font-size="7" fill="#475569" text-anchor="middle">Twist</text>
  <rect x="446" y="426" width="14" height="18" rx="4" fill="#e2e8f0"/><text x="453" y="438" font-family="'Segoe UI',sans-serif" font-size="7" fill="#475569" text-anchor="middle">&#8593;</text>
  <rect x="464" y="426" width="14" height="18" rx="4" fill="#e2e8f0"/><text x="471" y="438" font-family="'Segoe UI',sans-serif" font-size="7" fill="#475569" text-anchor="middle">&#8595;</text>
  <rect x="482" y="426" width="14" height="18" rx="4" fill="#e2e8f0"/><text x="489" y="438" font-family="'Segoe UI',sans-serif" font-size="7" fill="#475569" text-anchor="middle">&#8592;</text>
  <rect x="500" y="426" width="14" height="18" rx="4" fill="#e2e8f0"/><text x="507" y="438" font-family="'Segoe UI',sans-serif" font-size="7" fill="#475569" text-anchor="middle">&#8594;</text>
  <rect x="518" y="426" width="44" height="18" rx="4" fill="#e2e8f0"/><text x="540" y="438" font-family="'Segoe UI',sans-serif" font-size="7" fill="#475569" text-anchor="middle">Pressure</text>
  <text x="470" y="470" font-family="'Segoe UI',sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle" font-weight="600">Simulator Panel</text>
  <text x="470" y="482" font-family="'Segoe UI',sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">click buttons or use keyboard</text>

  <!-- ==================== RIGHT SIDE: FALLBACK PATH ==================== -->

  <!-- Mock WebSocket -->
  <rect x="650" y="230" width="200" height="80" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <rect x="666" y="244" width="50" height="20" rx="4" fill="#fef3c7"/>
  <text x="691" y="258" font-family="'Segoe UI',sans-serif" font-size="8" fill="#92400e" text-anchor="middle">fallback</text>
  <text x="750" y="262" font-family="'Segoe UI',sans-serif" font-size="13" fill="#334155" font-weight="600">Mock WebSocket</text>
  <text x="750" y="280" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Auto-activates when</text>
  <text x="750" y="294" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">no band is connected</text>

  <!-- Arrow: App -> Mock (dashed) -->
  <line x1="590" y1="270" x2="650" y2="270" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <defs><marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker></defs>

  <!-- Keyboard Fallback -->
  <rect x="650" y="340" width="200" height="80" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="368" font-family="'Segoe UI',sans-serif" font-size="13" fill="#334155" text-anchor="middle" font-weight="600">Keyboard Shortcuts</text>
  <text x="750" y="388" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">Space=tap  Shift=button</text>
  <text x="750" y="404" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">Arrows=nav  [/]=pressure</text>

  <!-- Arrow: Keyboard -> App -->
  <line x1="650" y1="380" x2="590" y2="360" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ==================== BOTTOM: SIGNAL LEGEND ==================== -->
  <rect x="40" y="502" width="820" height="28" rx="8" fill="#f1f5f9"/>
  <text x="55" y="520" font-family="'Segoe UI',sans-serif" font-size="9" fill="#64748b" font-weight="600">Signals:</text>
  <circle cx="110" cy="516" r="4" fill="#10b981"/><text x="118" y="520" font-family="monospace" font-size="9" fill="#475569">gesture</text>
  <circle cx="187" cy="516" r="4" fill="#f59e0b"/><text x="195" y="520" font-family="monospace" font-size="9" fill="#475569">pressure</text>
  <circle cx="270" cy="516" r="4" fill="#3b82f6"/><text x="278" y="520" font-family="monospace" font-size="9" fill="#475569">navigation</text>
  <circle cx="365" cy="516" r="4" fill="#8b5cf6"/><text x="373" y="520" font-family="monospace" font-size="9" fill="#475569">nav_direction</text>
  <circle cx="475" cy="516" r="4" fill="#06b6d4"/><text x="483" y="520" font-family="monospace" font-size="9" fill="#475569">imu_acc</text>
  <circle cx="550" cy="516" r="4" fill="#0891b2"/><text x="558" y="520" font-family="monospace" font-size="9" fill="#475569">imu_gyro</text>
  <circle cx="635" cy="516" r="4" fill="#ec4899"/><text x="643" y="520" font-family="monospace" font-size="9" fill="#475569">snc</text>
  <circle cx="685" cy="516" r="4" fill="#6b7280"/><text x="693" y="520" font-family="monospace" font-size="9" fill="#475569">button</text>
  <circle cx="745" cy="516" r="4" fill="#a3a3a3"/><text x="753" y="520" font-family="monospace" font-size="9" fill="#475569">battery</text>

</svg>
