<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>
  <!-- Browser chrome -->
  <rect x="20" y="20" width="760" height="30" fill="#2a2a4a" rx="6"/>
  <circle cx="40" cy="35" r="5" fill="#ff5f57"/>
  <circle cx="58" cy="35" r="5" fill="#febc2e"/>
  <circle cx="76" cy="35" r="5" fill="#28c840"/>
  <rect x="120" y="27" width="400" height="16" fill="#1a1a2e" rx="4"/>
  <!-- App area -->
  <rect x="20" y="60" width="760" height="340" fill="#0f0f23" rx="0 0 6 6"/>
  <!-- Simulator strip -->
  <rect x="20" y="60" width="760" height="35" fill="#1e1e3a"/>
  <text x="35" y="82" font-family="sans-serif" font-size="10" fill="#888">SIM</text>
  <rect x="65" y="68" width="40" height="20" fill="#3a3a6a" rx="4"/>
  <text x="73" y="82" font-family="sans-serif" font-size="9" fill="#ccc">Tap</text>
  <rect x="110" y="68" width="45" height="20" fill="#3a3a6a" rx="4"/>
  <text x="115" y="82" font-family="sans-serif" font-size="9" fill="#ccc">2Tap</text>
  <rect x="160" y="68" width="45" height="20" fill="#3a3a6a" rx="4"/>
  <text x="165" y="82" font-family="sans-serif" font-size="9" fill="#ccc">Twist</text>
  <rect x="215" y="68" width="20" height="20" fill="#3a3a6a" rx="4"/>
  <text x="221" y="82" font-family="sans-serif" font-size="11" fill="#ccc">&#8592;</text>
  <rect x="240" y="68" width="20" height="20" fill="#3a3a6a" rx="4"/>
  <text x="246" y="82" font-family="sans-serif" font-size="11" fill="#ccc">&#8594;</text>
  <!-- Slide content -->
  <rect x="100" y="120" width="600" height="240" fill="#1a1a3e" rx="8"/>
  <text x="400" y="200" font-family="sans-serif" font-size="28" fill="#e0e0ff" text-anchor="middle" font-weight="bold">Slide 3 of 10</text>
  <text x="400" y="240" font-family="sans-serif" font-size="14" fill="#8888bb" text-anchor="middle">Swipe left/right to navigate  &#8226;  Tap for laser pointer</text>
  <rect x="200" y="270" width="400" height="6" fill="#2a2a5a" rx="3"/>
  <rect x="200" y="270" width="120" height="6" fill="#6c63ff" rx="3"/>
  <!-- Connection indicator -->
  <circle cx="740" y="80" r="4" fill="#28c840"/>
  <!-- HUD -->
  <text x="40" y="390" font-family="monospace" font-size="10" fill="#4a4a7a">gesture: tap  |  direction: right  |  pressure: 42%</text>
  <!-- Badge -->
  <text x="680" y="390" font-family="sans-serif" font-size="9" fill="#4a4a7a">Created with Mudra Studio</text>
</svg>
