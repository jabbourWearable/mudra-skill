<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="gbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8eaed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gemini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4" />
      <stop offset="50%" style="stop-color:#9b72cb" />
      <stop offset="100%" style="stop-color:#d96570" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#gbg)" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="56" fill="#fff" rx="12"/>
  <text x="30" y="36" font-family="sans-serif" font-size="20" fill="url(#gemini)" font-weight="bold">Gemini</text>
  <text x="110" y="36" font-family="sans-serif" font-size="14" fill="#5f6368"> / Mudra Studio Gem</text>
  <!-- Chat bubbles -->
  <!-- User message -->
  <rect x="200" y="80" width="570" height="50" fill="#e8f0fe" rx="18"/>
  <text x="220" y="100" font-family="sans-serif" font-size="13" fill="#1a73e8">Create a drum machine with tap for kick, twist for snare,</text>
  <text x="220" y="118" font-family="sans-serif" font-size="13" fill="#1a73e8">and pressure to control volume</text>
  <!-- Gemini response -->
  <circle cx="40" cy="170" r="16" fill="url(#gemini)" opacity="0.8"/>
  <text x="34" y="175" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">G</text>
  <rect x="70" y="150" width="700" height="270" fill="#fff" rx="12"/>
  <text x="90" y="178" font-family="sans-serif" font-size="14" fill="#202124" font-weight="bold">Here's your Mudra-powered Drum Machine!</text>
  <text x="90" y="200" font-family="sans-serif" font-size="12" fill="#5f6368">Signals used:</text>
  <text x="90" y="218" font-family="monospace" font-size="11" fill="#1a73e8">  gesture  → tap = kick, double_tap = hi-hat, twist = snare</text>
  <text x="90" y="236" font-family="monospace" font-size="11" fill="#1a73e8">  pressure → volume control (0-100%)</text>
  <!-- Code block preview -->
  <rect x="90" y="255" width="660" height="145" fill="#f8f9fa" rx="8"/>
  <rect x="90" y="255" width="660" height="28" fill="#e8eaed" rx="8 8 0 0"/>
  <text x="105" y="274" font-family="monospace" font-size="11" fill="#5f6368">drum-machine.html</text>
  <text x="700" y="274" font-family="sans-serif" font-size="10" fill="#1a73e8">Copy</text>
  <text x="105" y="300" font-family="monospace" font-size="10" fill="#c53929">&lt;!DOCTYPE html&gt;</text>
  <text x="105" y="316" font-family="monospace" font-size="10" fill="#1a73e8">&lt;html lang="en"&gt;</text>
  <text x="105" y="332" font-family="monospace" font-size="10" fill="#1a73e8">&lt;head&gt;</text>
  <text x="105" y="348" font-family="monospace" font-size="10" fill="#0b8043">  &lt;title&gt;Mudra Drum Machine&lt;/title&gt;</text>
  <text x="105" y="364" font-family="monospace" font-size="10" fill="#5f6368">  &lt;style&gt; /* ... 800+ lines */ &lt;/style&gt;</text>
  <text x="105" y="380" font-family="monospace" font-size="10" fill="#5f6368">  ...</text>
</svg>
