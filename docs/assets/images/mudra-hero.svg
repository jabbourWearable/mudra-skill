<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#hero-bg)" rx="12"/>
  <!-- Band icon -->
  <ellipse cx="120" cy="100" rx="50" ry="28" fill="none" stroke="#fff" stroke-width="3" opacity="0.9"/>
  <rect x="95" y="86" width="50" height="28" fill="#fff" opacity="0.15" rx="4"/>
  <circle cx="110" cy="100" r="3" fill="#4ade80"/>
  <circle cx="120" cy="100" r="3" fill="#4ade80"/>
  <circle cx="130" cy="100" r="3" fill="#4ade80"/>
  <!-- Title -->
  <text x="200" y="85" font-family="sans-serif" font-size="42" fill="#fff" font-weight="bold">Mudra Studio</text>
  <text x="200" y="115" font-family="sans-serif" font-size="16" fill="#e0d4f7">AI-powered app builder for Mudra Band wearable</text>
  <text x="200" y="145" font-family="sans-serif" font-size="13" fill="#c4b5e0">Describe an experience. Get a working app. No code required.</text>
  <!-- Signal icons -->
  <text x="560" y="75" font-family="monospace" font-size="11" fill="#c4b5e0">gesture  &#9758;</text>
  <text x="560" y="95" font-family="monospace" font-size="11" fill="#c4b5e0">pressure &#9646;</text>
  <text x="560" y="115" font-family="monospace" font-size="11" fill="#c4b5e0">motion   &#10148;</text>
  <text x="560" y="135" font-family="monospace" font-size="11" fill="#c4b5e0">neural   &#9851;</text>
  <text x="680" y="75" font-family="monospace" font-size="11" fill="#c4b5e0">nav      &#8982;</text>
  <text x="680" y="95" font-family="monospace" font-size="11" fill="#c4b5e0">imu      &#8634;</text>
  <text x="680" y="115" font-family="monospace" font-size="11" fill="#c4b5e0">snc      &#8767;</text>
  <text x="680" y="135" font-family="monospace" font-size="11" fill="#c4b5e0">battery  &#9889;</text>
</svg>
