<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluffy Bird — Mudra</title>
<style>
:root {
  --bg-top: #ffe5ee;
  --bg-bot: #b8e7ff;
  --card: #ffffffcc;
  --text: #34324a;
  --text-secondary: #6b6a85;
  --primary: #ff8fb1;
  --accent: #ffc857;
  --success: #22c55e;
  --warning: #eab308;
  --error: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Poppins', system-ui, sans-serif;
  background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

#topbar {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  backdrop-filter: blur(10px);
  padding: 8px 12px;
  border-radius: 999px;
  box-shadow: 0 6px 24px rgba(255,143,177,0.18);
  z-index: 30;
}
.mode-toggle {
  display: inline-flex;
  gap: 4px;
  background: #fff;
  padding: 3px;
  border-radius: 999px;
  border: 1px solid rgba(255,143,177,0.25);
}
.mode-opt {
  background: transparent;
  color: var(--text-secondary);
  border: none;
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  font-family: inherit;
}
.mode-opt.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 6px rgba(255,143,177,0.4);
}
.conn-pill {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid transparent;
}
.conn-manual { background: transparent; color: var(--text-secondary); border-color: var(--text-secondary); }
.conn-connecting { background: var(--warning); color: #000; }
.conn-connected { background: var(--success); color: #fff; }
.conn-disconnected { background: var(--error); color: #fff; }

#stage {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

#hud {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
  pointer-events: none;
}
#score {
  font-size: 64px;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 4px 0 rgba(255,143,177,0.6), 0 6px 14px rgba(0,0,0,0.15);
  letter-spacing: 2px;
}
#best {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 600;
  margin-top: 4px;
}

#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
  pointer-events: none;
}
.panel {
  background: var(--card);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  padding: 32px 40px;
  text-align: center;
  box-shadow: 0 12px 40px rgba(255,143,177,0.25);
  border: 1px solid #fff;
  pointer-events: auto;
  max-width: 90vw;
}
.panel h1 {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 6px;
  letter-spacing: 1px;
}
.panel h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
}
.panel p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 18px;
  line-height: 1.5;
}
.panel .big {
  font-size: 56px;
  font-weight: 800;
  color: var(--primary);
  margin: 8px 0;
}
.cta {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 12px 28px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 14px rgba(255,143,177,0.5);
  transition: transform 0.15s ease;
}
.cta:hover { transform: translateY(-1px); }
.cta:active { transform: translateY(1px); }
.kbd {
  display: inline-block;
  background: #fff;
  border: 1px solid rgba(255,143,177,0.3);
  border-bottom-width: 2px;
  border-radius: 6px;
  padding: 2px 8px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--text);
  margin: 0 2px;
}
.hidden { display: none !important; }

#simPanel {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  background: var(--card);
  backdrop-filter: blur(10px);
  padding: 8px 10px;
  border-radius: 999px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  z-index: 25;
  align-items: center;
}
#simPanel .lbl {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 8px 0 4px;
}
#simPanel .btn {
  background: #fff;
  color: var(--text);
  border: 1px solid rgba(255,143,177,0.3);
  padding: 6px 12px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.1s ease, background 0.15s ease;
}
#simPanel .btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
#simPanel .btn:active { transform: scale(0.95); }
#simPanel.disabled { pointer-events: none; opacity: 0.4; }
#simPanel.disabled .btn { cursor: not-allowed; }

.mudra-badge {
  position: fixed;
  bottom: 12px;
  right: 14px;
  font-size: 11px;
  color: var(--text-secondary);
  opacity: 0.7;
  pointer-events: none;
  z-index: 5;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div id="topbar">
  <div class="mode-toggle" role="radiogroup" aria-label="Mode">
    <button id="modeManual" role="radio" aria-checked="true" class="mode-opt active">Manual</button>
    <button id="modeMudra" role="radio" aria-checked="false" class="mode-opt">Mudra</button>
  </div>
  <div id="connPill" class="conn-pill conn-manual" role="status" aria-live="polite">Manual mode</div>
</div>

<canvas id="stage"></canvas>

<div id="hud" class="hidden">
  <div id="score">0</div>
  <div id="best">Best: 0</div>
</div>

<div id="overlay">
  <div id="startPanel" class="panel">
    <h1>🐥 Fluffy Bird</h1>
    <h2>Tap to flap</h2>
    <p>Click your Mudra Band to make the bird jump.<br>
    Or press <span class="kbd">Space</span> / tap the screen.</p>
    <button id="startBtn" class="cta">Start Flapping</button>
  </div>

  <div id="endPanel" class="panel hidden">
    <h2>Game Over</h2>
    <div class="big" id="endScore">0</div>
    <p id="endMsg">Best: 0</p>
    <button id="restartBtn" class="cta">Try Again</button>
  </div>
</div>

<div id="simPanel">
  <span class="lbl">Gesture</span>
  <button class="btn" id="simTap">Tap</button>
  <button class="btn" id="sim2Tap">2Tap</button>
  <button class="btn" id="simTwist">Twist</button>
  <button class="btn" id="sim2Twist">2Twist</button>
</div>

<div class="mudra-badge">Created by Mudra</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────
const WS_URL = "ws://127.0.0.1:8766";
const SUBSCRIBED_SIGNALS = ["gesture"];
const STATUS_POLL_MS = 2000;
const RECONNECT_DELAYS_MS = [1000, 2000, 5000, 5000, 5000];

// ── Mode + connection state ────────────────────────────────────────────
let mode = "manual";
let connectionState = "idle";
let socket = null;
let connToken = 0;
let reconnectTimer = null;
let reconnectIndex = 0;
let statusPollTimer = null;

// ── Game state ─────────────────────────────────────────────────────────
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
let W = 0, H = 0;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const G = 0.32;     // gravity
const FLAP = -7;    // jump impulse
const PIPE_GAP = 360;
const PIPE_W = 70;
const PIPE_SPEED = 1.5;
const PIPE_INTERVAL = 5000; // ms

let gameStatus = "idle"; // idle | playing | dead
let bird;
let pipes = [];
let clouds = [];
let particles = [];
let lastPipeSpawn = 0;
let score = 0;
let best = Number(localStorage.getItem("fluffy-best") || 0);

function newBird() {
  return {
    x: W * 0.28,
    y: H * 0.45,
    vy: 0,
    r: 22,
    rot: 0,
    wing: 0,
    flashUntil: 0,
  };
}

function resetGame() {
  bird = newBird();
  pipes = [];
  particles = [];
  score = 0;
  lastPipeSpawn = 0;
  updateScore();
}

function spawnClouds() {
  clouds = [];
  for (let i = 0; i < 6; i++) {
    clouds.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.55 + 40,
      r: 30 + Math.random() * 40,
      s: 0.2 + Math.random() * 0.4,
    });
  }
}
spawnClouds();

function spawnPipe() {
  const margin = 80;
  const gapY = margin + Math.random() * (H - PIPE_GAP - margin * 2);
  pipes.push({ x: W + 20, gapY, passed: false });
}

function flap() {
  if (gameStatus === "idle") return;
  if (gameStatus === "dead") return;
  bird.vy = FLAP;
  bird.flashUntil = performance.now() + 120;
  // flap puff particles
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: bird.x - 8,
      y: bird.y + 4,
      vx: -1 - Math.random() * 1.5,
      vy: (Math.random() - 0.5) * 1.5,
      life: 1,
      r: 3 + Math.random() * 3,
      c: "#ffffff",
    });
  }
}

function startGame() {
  resetGame();
  gameStatus = "playing";
  document.getElementById("startPanel").classList.add("hidden");
  document.getElementById("endPanel").classList.add("hidden");
  document.getElementById("hud").classList.remove("hidden");
}

function endGame() {
  if (gameStatus === "dead") return;
  gameStatus = "dead";
  if (score > best) {
    best = score;
    localStorage.setItem("fluffy-best", String(best));
  }
  document.getElementById("endScore").textContent = score;
  document.getElementById("endMsg").textContent =
    score >= best && score > 0 ? `🏆 New best!  Score: ${score}` : `Best: ${best}`;
  document.getElementById("endPanel").classList.remove("hidden");
  // burst particles
  for (let i = 0; i < 30; i++) {
    particles.push({
      x: bird.x, y: bird.y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 2,
      life: 1, r: 3 + Math.random() * 4,
      c: ["#ff8fb1", "#ffc857", "#fff"][Math.floor(Math.random() * 3)],
    });
  }
}

function updateScore() {
  document.getElementById("score").textContent = score;
  document.getElementById("best").textContent = `Best: ${best}`;
}

// ── Render ─────────────────────────────────────────────────────────────
function drawCloud(c) {
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.beginPath();
  ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
  ctx.arc(c.x + c.r * 0.7, c.y + 6, c.r * 0.8, 0, Math.PI * 2);
  ctx.arc(c.x - c.r * 0.7, c.y + 8, c.r * 0.7, 0, Math.PI * 2);
  ctx.arc(c.x + c.r * 0.2, c.y - c.r * 0.5, c.r * 0.6, 0, Math.PI * 2);
  ctx.fill();
}

function drawBird(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.rot);

  // fluffy body — many soft circles
  const flashing = performance.now() < b.flashUntil;
  const bodyColor = flashing ? "#fff5d6" : "#fff0a8";
  const fluffColor = flashing ? "#ffffff" : "#fff8d6";

  // outer fluff
  ctx.fillStyle = fluffColor;
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
    const rr = b.r + 5 + Math.sin(performance.now() / 200 + a * 3) * 1.5;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * rr * 0.85, Math.sin(a) * rr * 0.85, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(0, 0, b.r, 0, Math.PI * 2);
  ctx.fill();

  // belly
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.ellipse(2, 6, b.r * 0.65, b.r * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // wing
  const wingY = Math.sin(b.wing) * 4;
  ctx.fillStyle = "#ffd97a";
  ctx.beginPath();
  ctx.ellipse(-4, 2 + wingY, 11, 7, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // eye
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(8, -4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#34324a";
  ctx.beginPath();
  ctx.arc(9, -4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(9.7, -4.7, 0.9, 0, Math.PI * 2);
  ctx.fill();

  // beak
  ctx.fillStyle = "#ff8a3d";
  ctx.beginPath();
  ctx.moveTo(b.r - 2, 0);
  ctx.lineTo(b.r + 9, -2);
  ctx.lineTo(b.r + 9, 4);
  ctx.closePath();
  ctx.fill();

  // cheek
  ctx.fillStyle = "rgba(255,143,177,0.55)";
  ctx.beginPath();
  ctx.arc(5, 4, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPipe(p) {
  // pipe gradient
  const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  grad.addColorStop(0, "#7cd896");
  grad.addColorStop(0.5, "#a8e6b8");
  grad.addColorStop(1, "#5cc97a");

  ctx.fillStyle = grad;

  // top
  roundRect(p.x, 0, PIPE_W, p.gapY - 16, 0, 0, 0, 0);
  // top cap
  ctx.fillStyle = "#5cc97a";
  ctx.fillRect(p.x - 6, p.gapY - 22, PIPE_W + 12, 22);
  ctx.fillStyle = "#7cd896";
  ctx.fillRect(p.x - 4, p.gapY - 20, PIPE_W + 8, 4);

  // bottom
  ctx.fillStyle = grad;
  roundRect(p.x, p.gapY + PIPE_GAP + 16, PIPE_W, H - (p.gapY + PIPE_GAP + 16), 0, 0, 0, 0);
  // bottom cap
  ctx.fillStyle = "#5cc97a";
  ctx.fillRect(p.x - 6, p.gapY + PIPE_GAP, PIPE_W + 12, 22);
  ctx.fillStyle = "#7cd896";
  ctx.fillRect(p.x - 4, p.gapY + PIPE_GAP + 18, PIPE_W + 8, 4);
}

function roundRect(x, y, w, h, r1, r2, r3, r4) {
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.fill();
}

function drawGround() {
  const groundY = H - 40;
  ctx.fillStyle = "#f7d488";
  ctx.fillRect(0, groundY, W, 40);
  ctx.fillStyle = "#7cd896";
  ctx.fillRect(0, groundY, W, 8);
}

function tick() {
  // sky already painted by CSS; clear only for redraw
  ctx.clearRect(0, 0, W, H);

  // clouds
  for (const c of clouds) {
    c.x -= c.s;
    if (c.x + c.r * 2 < 0) { c.x = W + c.r; c.y = Math.random() * H * 0.55 + 40; }
    drawCloud(c);
  }

  // game logic
  if (gameStatus === "playing") {
    // pipes
    const now = performance.now();
    if (now - lastPipeSpawn > PIPE_INTERVAL) {
      spawnPipe();
      lastPipeSpawn = now;
    }
    for (const p of pipes) {
      p.x -= PIPE_SPEED;
      if (!p.passed && p.x + PIPE_W < bird.x) {
        p.passed = true;
        score++;
        updateScore();
      }
    }
    pipes = pipes.filter(p => p.x + PIPE_W > -50);

    // bird physics
    bird.vy += G;
    bird.y += bird.vy;
    bird.rot = Math.max(-0.5, Math.min(1.4, bird.vy * 0.07));
    bird.wing += 0.4;

    // collisions
    const groundY = H - 40;
    if (bird.y + bird.r >= groundY || bird.y - bird.r <= 0) endGame();
    for (const p of pipes) {
      if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W) {
        if (bird.y - bird.r < p.gapY || bird.y + bird.r > p.gapY + PIPE_GAP) {
          endGame();
        }
      }
    }
  } else if (gameStatus === "idle") {
    // gentle hover
    bird = bird || newBird();
    bird.y = H * 0.45 + Math.sin(performance.now() / 400) * 12;
    bird.rot = Math.sin(performance.now() / 400) * 0.15;
    bird.wing += 0.25;
  } else if (gameStatus === "dead") {
    bird.vy += G;
    bird.y += bird.vy;
    bird.rot = Math.min(1.6, bird.rot + 0.05);
    const groundY = H - 40;
    if (bird.y + bird.r > groundY) { bird.y = groundY - bird.r; bird.vy = 0; }
  }

  // pipes
  for (const p of pipes) drawPipe(p);

  // ground
  drawGround();

  // bird
  if (bird) drawBird(bird);

  // particles
  for (const pt of particles) {
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vy += 0.2;
    pt.life -= 0.025;
    if (pt.life > 0) {
      ctx.globalAlpha = pt.life;
      ctx.fillStyle = pt.c;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r * pt.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  particles = particles.filter(p => p.life > 0);

  requestAnimationFrame(tick);
}
bird = newBird();
requestAnimationFrame(tick);

// ── Signal dispatch (single entry point — synthetic AND real) ─────────
function dispatch(msg) {
  if (msg.type === "connection_status") return handleConnectionStatus(msg.data);
  if (msg.type === "status")            return handleStatus(msg.data);
  if (msg.type === "gesture")           return handleGesture(msg.data);
}
function handleGesture(data = {}) {
  const t = data.type;
  if (t === "tap" || t === "single_tap") {
    if (gameStatus === "idle") startGame();
    flap();
  } else if (t === "double_tap") {
    if (gameStatus === "dead") startGame();
    else flap();
  }
  // twist/double_twist: ignored — we only flap
}
function handleStatus(data) {
  if (mode !== "mudra") return;
  const ds = data?.device?.state;
  if (ds === "connected") setState("connected");
  else                    setState("disconnected");
}
function handleConnectionStatus(data) {
  if (mode !== "mudra") return;
  if (data?.status === "disconnected") setState("disconnected");
  if (data?.status === "connected" && socket?.readyState === 1) {
    socket.send(JSON.stringify({ command: "get_status" }));
  }
}

// ── Socket lifecycle ──────────────────────────────────────────────────
function openSocket() {
  closeSocket();
  const myToken = ++connToken;
  setState("connecting");
  let ws;
  try { ws = new WebSocket(WS_URL); }
  catch (_) { setState("disconnected"); scheduleReconnect(); return; }
  ws.onopen = () => {
    if (myToken !== connToken) { try { ws.close(); } catch(_){} return; }
    socket = ws;
    SUBSCRIBED_SIGNALS.forEach(sig =>
      ws.send(JSON.stringify({ command: "subscribe", signal: sig }))
    );
    ws.send(JSON.stringify({ command: "get_status" }));
    startStatusPoll();
  };
  ws.onmessage = (e) => {
    try { dispatch(JSON.parse(e.data)); } catch(_) {}
  };
  const onDead = () => {
    if (myToken !== connToken) return;
    socket = null;
    stopStatusPoll();
    setState("disconnected");
    scheduleReconnect();
  };
  ws.onclose = onDead;
  ws.onerror = onDead;
}
function closeSocket() {
  connToken++;
  if (socket) { try { socket.close(); } catch(_){} socket = null; }
  cancelReconnect();
  stopStatusPoll();
}
function scheduleReconnect() {
  if (mode !== "mudra") return;
  cancelReconnect();
  const delay = RECONNECT_DELAYS_MS[Math.min(reconnectIndex, RECONNECT_DELAYS_MS.length - 1)];
  reconnectIndex++;
  reconnectTimer = setTimeout(() => { if (mode === "mudra") openSocket(); }, delay);
}
function cancelReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = null;
}
function startStatusPoll() {
  stopStatusPoll();
  statusPollTimer = setInterval(() => {
    if (mode !== "mudra" || !socket || socket.readyState !== 1) return;
    socket.send(JSON.stringify({ command: "get_status" }));
  }, STATUS_POLL_MS);
}
function stopStatusPoll() {
  if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
}

// ── Mode + connection-pill UI ─────────────────────────────────────────
function setState(next) {
  connectionState = next;
  const pill = document.getElementById("connPill");
  pill.classList.remove("conn-manual", "conn-connecting", "conn-connected", "conn-disconnected");
  if (mode === "manual") { pill.classList.add("conn-manual"); pill.textContent = "Manual mode"; return; }
  if (next === "connecting")    { pill.classList.add("conn-connecting");    pill.textContent = "Connecting…"; }
  else if (next === "connected"){ pill.classList.add("conn-connected");     pill.textContent = "Connected"; reconnectIndex = 0; }
  else if (next === "disconnected"){ pill.classList.add("conn-disconnected"); pill.textContent = "Disconnected"; }
}

function setMode(next) {
  if (next === mode) return;
  mode = next;
  // Discrete signals only — no continuous reset needed for this app.
  const sim = document.getElementById("simPanel");
  sim.classList.toggle("disabled", mode === "mudra");
  sim.querySelectorAll("button").forEach(b => {
    b.setAttribute("aria-disabled", mode === "mudra" ? "true" : "false");
    b.tabIndex = mode === "mudra" ? -1 : 0;
  });
  document.getElementById("modeManual").setAttribute("aria-checked", mode === "manual");
  document.getElementById("modeMudra").setAttribute("aria-checked",  mode === "mudra");
  document.getElementById("modeManual").classList.toggle("active", mode === "manual");
  document.getElementById("modeMudra").classList.toggle("active",  mode === "mudra");
  if (mode === "mudra") { setState("connecting"); openSocket(); }
  else                  { closeSocket(); setState("idle"); }
}

document.getElementById("modeManual").onclick = () => setMode("manual");
document.getElementById("modeMudra").onclick  = () => setMode("mudra");

// ── Sim panel — Manual-only synthetic injection ──────────────────────
function simGesture(type) {
  if (mode === "mudra") return;
  dispatch({ type: "gesture", data: { type, confidence: 1.0, timestamp: Date.now() }, timestamp: Date.now() });
}
document.getElementById("simTap").onclick    = () => simGesture("tap");
document.getElementById("sim2Tap").onclick   = () => simGesture("double_tap");
document.getElementById("simTwist").onclick  = () => simGesture("twist");
document.getElementById("sim2Twist").onclick = () => simGesture("double_twist");

// ── Subject (canvas) click pass-through — Mudra mode only ────────────
canvas.addEventListener("click", () => {
  if (mode === "mudra") {
    if (socket && socket.readyState === 1) {
      socket.send(JSON.stringify({ command: "trigger_gesture", data: { type: "tap" } }));
    }
    return;
  }
  // Manual mode: canvas tap fires synthetic tap so the user can still play
  // without the sim button.
  simGesture("tap");
});

// ── Keyboard fallback (gated in Mudra) ───────────────────────────────
document.addEventListener("keydown", (e) => {
  if (mode === "mudra") return;
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    simGesture("tap");
  }
});

// ── Start / restart buttons ──────────────────────────────────────────
document.getElementById("startBtn").onclick = () => {
  startGame();
  flap();
};
document.getElementById("restartBtn").onclick = () => {
  startGame();
  flap();
};

// initial UI
updateScore();
setState("idle");
</script>
</body>
</html>
