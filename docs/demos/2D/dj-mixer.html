<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DJ Mixer — Mudra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080f;
    --card: #0f0f1c;
    --surface: rgba(255,255,255,0.04);
    --deck-a: #00e5ff;
    --deck-b: #df00ff;
    --text: #e4e4f0;
    --text-muted: #606078;
    --border: rgba(255,255,255,0.07);
    --success: #00e96c;
    --warning: #ffd600;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Orbitron', system-ui, monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }

  .brand { font-size: 13px; font-weight: 900; letter-spacing: 0.14em; }
  .brand .ca { color: var(--deck-a); }
  .brand .cb { color: var(--deck-b); }

  .conn-row { display: flex; align-items: center; gap: 7px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warning); box-shadow: 0 0 0 3px rgba(255,214,0,0.15); transition: all 150ms; flex-shrink: 0; }
  .dot.live { background: var(--success); box-shadow: 0 0 0 3px rgba(0,233,108,0.2); }
  #connLabel { font-size: 10px; color: var(--text-muted); }

  .hud { display: flex; gap: 14px; font-size: 10px; }
  .hud-item { display: flex; gap: 4px; }
  .hud-k { color: var(--text-muted); }
  .hud-v { color: var(--text); font-variant-numeric: tabular-nums; min-width: 40px; }

  /* ── Simulator panel ── */
  .sim-panel {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    background: rgba(0,0,0,0.5);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .sim-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 2px; }
  .sim-div { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 9px;
    border-radius: 6px;
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 120ms;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--deck-a); color: var(--deck-a); background: rgba(0,229,255,0.06); }

  .sim-group { display: flex; align-items: center; gap: 5px; }
  .p-label { font-size: 9px; color: var(--text-muted); white-space: nowrap; }
  .p-slider { width: 90px; accent-color: var(--deck-a); cursor: pointer; }
  .p-val { font-size: 10px; color: var(--text-muted); min-width: 30px; font-variant-numeric: tabular-nums; }

  /* ── Main 3-column layout ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 130px 1fr;
    gap: 10px;
    padding: 10px;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Deck ── */
  .deck {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color 200ms, box-shadow 200ms;
  }
  .deck.hi-a { border-color: rgba(0,229,255,0.35); box-shadow: 0 0 28px rgba(0,229,255,0.07); }
  .deck.hi-b { border-color: rgba(223,0,255,0.35); box-shadow: 0 0 28px rgba(223,0,255,0.07); }

  .deck-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .deck-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border-radius: 5px;
  }
  .deck-badge.a { background: rgba(0,229,255,0.12); color: var(--deck-a); border: 1px solid rgba(0,229,255,0.28); }
  .deck-badge.b { background: rgba(223,0,255,0.12); color: var(--deck-b); border: 1px solid rgba(223,0,255,0.28); }

  .play-status { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--text-muted); letter-spacing: 0.06em; }
  .pind { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; transition: all 150ms; }
  .pind.on-a { background: var(--deck-a); box-shadow: 0 0 6px var(--deck-a); animation: blink 0.9s ease-in-out infinite; }
  .pind.on-b { background: var(--deck-b); box-shadow: 0 0 6px var(--deck-b); animation: blink 0.9s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

  /* Vinyl */
  .vinyl-wrap { display: flex; justify-content: center; padding: 12px 12px 8px; flex-shrink: 0; }

  .vinyl {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    position: relative;
  }

  .vinyl-a {
    background: conic-gradient(#0c1a20 0deg,#0d2c38 40deg,#0a1218 80deg,#0d2c38 120deg,#0a1218 160deg,#0d2c38 200deg,#0a1218 240deg,#0d2c38 280deg,#0a1218 320deg,#0d2c38 360deg);
    border: 2px solid rgba(0,229,255,0.28);
    box-shadow: 0 0 18px rgba(0,229,255,0.12), inset 0 0 20px rgba(0,0,0,0.6);
  }

  .vinyl-b {
    background: conic-gradient(#1a0c20 0deg,#2c0d38 40deg,#130a18 80deg,#2c0d38 120deg,#130a18 160deg,#2c0d38 200deg,#130a18 240deg,#2c0d38 280deg,#130a18 320deg,#2c0d38 360deg);
    border: 2px solid rgba(223,0,255,0.28);
    box-shadow: 0 0 18px rgba(223,0,255,0.12), inset 0 0 20px rgba(0,0,0,0.6);
  }

  .vinyl-hole {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid rgba(255,255,255,0.08);
  }

  .spinning { animation: spin 2.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Track info */
  .track-info { padding: 0 12px 8px; text-align: center; flex-shrink: 0; }
  .track-name { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-artist { font-size: 9px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.04em; }

  /* Waveform */
  .wave-wrap { padding: 0 12px 12px; flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: flex-end; }
  canvas.wave { width: 100%; height: 56px; border-radius: 6px; display: block; }

  /* ── Center column ── */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .bpm-block { text-align: center; }
  .bpm-num { font-size: 24px; font-weight: 900; color: var(--deck-a); line-height: 1; }
  .bpm-unit { font-size: 8px; color: var(--text-muted); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 3px; }

  .active-block { text-align: center; }
  .active-lbl { font-size: 8px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .active-val { font-size: 20px; font-weight: 900; transition: color 200ms; }
  .active-val.av-a { color: var(--deck-a); }
  .active-val.av-b { color: var(--deck-b); }

  /* Crossfader */
  .xfader-block { width: 100%; }
  .xf-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .xf-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; }
  .xf-lbl.a { color: var(--deck-a); }
  .xf-lbl.b { color: var(--deck-b); }

  .xf-track {
    width: 100%;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, rgba(0,229,255,0.25), rgba(223,0,255,0.25));
    border: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    user-select: none;
  }

  .xf-thumb {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
    transition: left 60ms ease-out;
    cursor: grab;
    pointer-events: none;
  }

  .xf-val { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 6px; font-variant-numeric: tabular-nums; }

  /* ── Beat flash overlay ── */
  .beat-flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    z-index: 999;
    background: radial-gradient(ellipse at center, rgba(223,0,255,0.35) 0%, rgba(0,229,255,0.1) 50%, transparent 75%);
  }
  .beat-flash.fire { animation: bflash 550ms ease-out forwards; }
  @keyframes bflash {
    0%   { opacity: 1; transform: scale(0.85); }
    25%  { opacity: 0.95; transform: scale(1.05); }
    100% { opacity: 0; transform: scale(1); }
  }

  .deck.beat-pulse { animation: deckpulse 0.45s ease-out; }
  @keyframes deckpulse {
    0%   { box-shadow: 0 0  0   0  rgba(223,0,255,0.7); }
    100% { box-shadow: 0 0 44px 18px rgba(223,0,255,0); }
  }

  /* ── Footer ── */
  .footer {
    padding: 6px 16px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 8px;
    flex-wrap: wrap;
  }

  .mudra-badge { font-size: 10px; color: var(--text-muted); opacity: 0.45; letter-spacing: 0.04em; }
  .keys-hint { font-size: 9px; color: var(--text-muted); opacity: 0.4; }

  @media (max-width: 680px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto 1fr; }
    .center { flex-direction: row; height: auto; padding: 8px; }
    .vinyl { width: 72px; height: 72px; }
    .hud { display: none; }
  }
</style>
</head>
<body>

<!-- Beat drop overlay -->
<div class="beat-flash" id="beatFlash"></div>

<!-- ── Header ── -->
<div class="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="brand"><span class="ca">MUDRA</span> <span class="cb">DJ</span></div>
    <div class="conn-row">
      <div class="dot" id="dot"></div>
      <span id="connLabel">Connecting…</span>
    </div>
  </div>
  <div class="hud">
    <div class="hud-item"><span class="hud-k">Gesture:</span><span class="hud-v" id="hudGesture">–</span></div>
    <div class="hud-item"><span class="hud-k">Dir:</span><span class="hud-v" id="hudDir">–</span></div>
    <div class="hud-item"><span class="hud-k">Xfade:</span><span class="hud-v" id="hudXfade">50%</span></div>
    <div class="hud-item"><span class="hud-k">Active:</span><span class="hud-v" id="hudActive">A</span></div>
  </div>
</div>

<!-- ── Simulator panel ── -->
<div class="sim-panel">
  <span class="sim-label">Sim</span>

  <div class="sim-group">
    <button class="btn" onclick="simGesture('tap')">Tap</button>
    <button class="btn" onclick="simGesture('double_tap')">2Tap</button>
    <button class="btn" onclick="simGesture('twist')">Twist</button>
    <button class="btn" onclick="simGesture('double_twist')">2Twist</button>
  </div>

  <div class="sim-div"></div>

  <div class="sim-group">
    <button class="btn" onclick="simDir('Left')">←</button>
    <button class="btn" onclick="simDir('Right')">→</button>
    <button class="btn" onclick="simDir('Up')">↑</button>
    <button class="btn" onclick="simDir('Down')">↓</button>
    <button class="btn" onclick="simDir('Roll Left')">Roll L</button>
    <button class="btn" onclick="simDir('Roll Right')">Roll R</button>
  </div>

  <div class="sim-div"></div>

  <div class="sim-group">
    <span class="p-label">Xfader</span>
    <input type="range" class="p-slider" id="pSim" min="0" max="100" value="50"
           oninput="simPressure(this.value)">
    <span class="p-val" id="pSimVal">50%</span>
  </div>
</div>

<!-- ── Main ── -->
<div class="main">

  <!-- Deck A -->
  <div class="deck hi-a" id="deckA">
    <div class="deck-head">
      <span class="deck-badge a">DECK A</span>
      <div class="play-status">
        <div class="pind" id="pindA"></div>
        <span id="playLblA">STOPPED</span>
      </div>
    </div>
    <div class="vinyl-wrap">
      <div class="vinyl vinyl-a" id="vinylA"><div class="vinyl-hole"></div></div>
    </div>
    <div class="track-info">
      <div class="track-name" id="tNameA">Neon Nights</div>
      <div class="track-artist" id="tArtA">Cyber Collective</div>
    </div>
    <div class="wave-wrap">
      <canvas class="wave" id="waveA" width="320" height="56"></canvas>
    </div>
  </div>

  <!-- Center -->
  <div class="center">
    <div class="bpm-block">
      <div class="bpm-num">128</div>
      <div class="bpm-unit">BPM</div>
    </div>

    <div class="active-block">
      <div class="active-lbl">Active</div>
      <div class="active-val av-a" id="activeVal">A</div>
    </div>

    <div class="xfader-block">
      <div class="xf-labels">
        <span class="xf-lbl a">A</span>
        <span class="xf-lbl b">B</span>
      </div>
      <div class="xf-track" id="xfTrack">
        <div class="xf-thumb" id="xfThumb"></div>
      </div>
      <div class="xf-val" id="xfVal">50%</div>
    </div>
  </div>

  <!-- Deck B -->
  <div class="deck" id="deckB">
    <div class="deck-head">
      <span class="deck-badge b">DECK B</span>
      <div class="play-status">
        <div class="pind" id="pindB"></div>
        <span id="playLblB">STOPPED</span>
      </div>
    </div>
    <div class="vinyl-wrap">
      <div class="vinyl vinyl-b" id="vinylB"><div class="vinyl-hole"></div></div>
    </div>
    <div class="track-info">
      <div class="track-name" id="tNameB">Cyber Dawn</div>
      <div class="track-artist" id="tArtB">Neon Syndicate</div>
    </div>
    <div class="wave-wrap">
      <canvas class="wave" id="waveB" width="320" height="56"></canvas>
    </div>
  </div>

</div>

<!-- ── Footer ── -->
<div class="footer">
  <span class="mudra-badge">Powered by Mudra Band</span>
  <span class="keys-hint">Space = play/pause · D = beat drop · ← → = track · ↑ ↓ = xfader</span>
</div>

<script>
/* ── Track library ─────────────────────────────────────────── */
const TRACKS_A = [
  { name: 'Neon Nights',     artist: 'Cyber Collective' },
  { name: 'Circuit Breaker', artist: 'Digital Punk'     },
  { name: 'Bass City',       artist: 'Sub Zero Hz'      },
  { name: 'Glitch Galaxy',   artist: 'Quantum Rift'     },
];
const TRACKS_B = [
  { name: 'Cyber Dawn',      artist: 'Neon Syndicate'   },
  { name: 'Electric Dreams', artist: 'Voltage Ghost'    },
  { name: 'Dark Matter',     artist: 'Void Frequency'   },
  { name: 'Pulse Wave',      artist: 'Phase Shift'      },
];

/* ── App state ─────────────────────────────────────────────── */
let xfade   = 50;  // 0 = full A, 100 = full B
let playA   = false;
let playB   = false;
let idxA    = 0;
let idxB    = 0;
let waveSpike = false;

const activeDeck = () => xfade < 50 ? 'A' : 'B';

/* ── Mock WebSocket — passive (no auto-fire intervals) ─────── */
class MudraWebSocket {
  constructor(url) {
    this._handlers = {};
    this._subscriptions = new Set();
    this._useMock = false;
    try {
      this._ws = new WebSocket(url);
      this._ws.onopen    = (e) => { this._useMock = false; this._trigger('open', e); };
      this._ws.onmessage = (e) => this._trigger('message', e);
      this._ws.onclose   = (e) => this._trigger('close', e);
      this._ws.onerror   = ()  => { this._startMock(); };
    } catch {
      this._startMock();
    }
  }

  set onopen(fn)    { this._handlers.open    = fn; }
  set onmessage(fn) { this._handlers.message = fn; }
  set onclose(fn)   { this._handlers.close   = fn; }
  set onerror(fn)   { this._handlers.error   = fn; }

  _trigger(ev, d) { if (this._handlers[ev]) this._handlers[ev](d); }
  _emit(payload)  { this._trigger('message', { data: JSON.stringify(payload) }); }

  send(raw) {
    if (!this._useMock) { this._ws.send(raw); return; }
    const cmd = JSON.parse(raw);
    if (cmd.command === 'subscribe')       this._subscriptions.add(cmd.signal);
    if (cmd.command === 'trigger_gesture') {
      this._emit({ type: 'gesture', data: { type: cmd.data.type, confidence: 0.99, timestamp: Date.now() }, timestamp: Date.now() });
    }
  }

  _startMock() {
    this._useMock = true;
    // Fire connection status only — no auto-firing intervals (sim panel drives signals)
    setTimeout(() => {
      this._trigger('open', {});
      this._emit({ type: 'connection_status', data: { status: 'connected', message: 'Mudra Companion ready (simulated)' }, timestamp: Date.now() });
    }, 120);
  }

  close() { if (!this._useMock && this._ws) this._ws.close(); }
}

/* ── WebSocket setup ───────────────────────────────────────── */
const ws = new MudraWebSocket('ws://127.0.0.1:8766');

ws.onopen = () => {
  ws.send(JSON.stringify({ command: 'subscribe', signal: 'gesture' }));
  ws.send(JSON.stringify({ command: 'subscribe', signal: 'nav_direction' }));
  ws.send(JSON.stringify({ command: 'subscribe', signal: 'pressure' }));
  setStatus(true);
};

ws.onmessage = (e) => {
  try {
    const msg = JSON.parse(e.data);
    if (msg.type === 'connection_status') { setStatus(msg.data?.status === 'connected'); return; }
    if (msg.type === 'gesture')       handleGesture(msg.data);
    if (msg.type === 'nav_direction') handleNavDir(msg.data);
    if (msg.type === 'pressure')      handlePressure(msg.data);
  } catch {}
};

ws.onclose = () => setStatus(false);

/* ── Signal handlers ───────────────────────────────────────── */
function handleGesture(d) {
  document.getElementById('hudGesture').textContent = d.type;
  if (d.type === 'tap')         togglePlay();
  else if (d.type === 'double_tap') doBeatDrop();
}

function handleNavDir(d) {
  document.getElementById('hudDir').textContent = d.direction;
  if (d.direction === 'Left')  prevTrack();
  if (d.direction === 'Right') nextTrack();
}

function handlePressure(d) {
  const v = d.normalized !== undefined ? Math.round(d.normalized * 100) : d.value;
  setCrossfade(v);
}

/* ── DJ actions ────────────────────────────────────────────── */
function togglePlay() {
  if (activeDeck() === 'A') playA = !playA;
  else                       playB = !playB;
  renderDecks();
}

function nextTrack() {
  if (activeDeck() === 'A') idxA = (idxA + 1) % TRACKS_A.length;
  else                       idxB = (idxB + 1) % TRACKS_B.length;
  renderDecks();
}

function prevTrack() {
  if (activeDeck() === 'A') idxA = (idxA - 1 + TRACKS_A.length) % TRACKS_A.length;
  else                       idxB = (idxB - 1 + TRACKS_B.length) % TRACKS_B.length;
  renderDecks();
}

function doBeatDrop() {
  const flash = document.getElementById('beatFlash');
  flash.classList.remove('fire');
  void flash.offsetWidth;
  flash.classList.add('fire');

  const dEl = activeDeck() === 'A' ? document.getElementById('deckA') : document.getElementById('deckB');
  dEl.classList.remove('beat-pulse');
  void dEl.offsetWidth;
  dEl.classList.add('beat-pulse');
  setTimeout(() => dEl.classList.remove('beat-pulse'), 450);

  waveSpike = true;
  setTimeout(() => { waveSpike = false; }, 650);
}

function setCrossfade(v) {
  xfade = Math.max(0, Math.min(100, v));

  document.getElementById('xfThumb').style.left = xfade + '%';
  document.getElementById('xfVal').textContent   = xfade + '%';
  document.getElementById('hudXfade').textContent = xfade + '%';
  document.getElementById('pSim').value           = xfade;
  document.getElementById('pSimVal').textContent  = xfade + '%';

  const deck = activeDeck();
  const av = document.getElementById('activeVal');
  av.textContent = deck;
  av.className   = 'active-val av-' + deck.toLowerCase();
  document.getElementById('hudActive').textContent = deck;

  renderDecks();
}

/* ── Render deck state ─────────────────────────────────────── */
function renderDecks() {
  const deck = activeDeck();

  // Deck A
  document.getElementById('tNameA').textContent = TRACKS_A[idxA].name;
  document.getElementById('tArtA').textContent  = TRACKS_A[idxA].artist;
  const pindA = document.getElementById('pindA');
  const vinA  = document.getElementById('vinylA');
  if (playA) {
    pindA.className = 'pind on-a';
    document.getElementById('playLblA').textContent = 'PLAYING';
    vinA.classList.add('spinning');
  } else {
    pindA.className = 'pind';
    document.getElementById('playLblA').textContent = 'STOPPED';
    vinA.classList.remove('spinning');
  }

  // Deck B
  document.getElementById('tNameB').textContent = TRACKS_B[idxB].name;
  document.getElementById('tArtB').textContent  = TRACKS_B[idxB].artist;
  const pindB = document.getElementById('pindB');
  const vinB  = document.getElementById('vinylB');
  if (playB) {
    pindB.className = 'pind on-b';
    document.getElementById('playLblB').textContent = 'PLAYING';
    vinB.classList.add('spinning');
  } else {
    pindB.className = 'pind';
    document.getElementById('playLblB').textContent = 'STOPPED';
    vinB.classList.remove('spinning');
  }

  // Active deck border highlight
  document.getElementById('deckA').className = 'deck' + (deck === 'A' ? ' hi-a' : '');
  document.getElementById('deckB').className = 'deck' + (deck === 'B' ? ' hi-b' : '');
}

/* ── Waveform animation ────────────────────────────────────── */
const BARS = 46;
const phA = Array.from({ length: BARS }, () => Math.random() * Math.PI * 2);
const phB = Array.from({ length: BARS }, () => Math.random() * Math.PI * 2);
let wT = 0;

function drawWave(canvasId, phases, playing, color, spikeColor) {
  const cv  = document.getElementById(canvasId);
  const ctx = cv.getContext('2d');
  const W   = cv.width;
  const H   = cv.height;
  ctx.clearRect(0, 0, W, H);

  const bw = Math.floor(W / BARS) - 1;

  for (let i = 0; i < BARS; i++) {
    let amp;
    if (playing) {
      amp = 0.25 + 0.65 * Math.abs(Math.sin(wT * 1.9 + phases[i]));
      if (waveSpike) amp = Math.min(1, amp + 0.45 * Math.random());
    } else {
      amp = 0.12 + 0.1 * Math.abs(Math.sin(phases[i]));
    }
    const bh = amp * H * 0.86;
    const x  = i * (bw + 1);
    const y  = (H - bh) / 2;

    const g = ctx.createLinearGradient(0, y, 0, y + bh);
    if (waveSpike && playing) {
      g.addColorStop(0, spikeColor);
      g.addColorStop(1, color + '60');
    } else {
      g.addColorStop(0, color);
      g.addColorStop(1, color + '50');
    }
    ctx.fillStyle = g;
    ctx.fillRect(x, y, bw, bh);
  }
}

function animLoop() {
  wT += 0.022;
  drawWave('waveA', phA, playA, '#00e5ff', '#ffffff');
  drawWave('waveB', phB, playB, '#df00ff', '#ff88ff');
  requestAnimationFrame(animLoop);
}

animLoop();

/* ── Simulator helpers ─────────────────────────────────────── */
function simGesture(type) {
  ws.send(JSON.stringify({ command: 'trigger_gesture', data: { type } }));
}

function simDir(direction) {
  handleNavDir({ direction, timestamp: Date.now() });
}

function simPressure(val) {
  handlePressure({ value: Number(val), normalized: Number(val) / 100, timestamp: Date.now() });
}

/* ── Keyboard shortcuts ────────────────────────────────────── */
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case ' ':          e.preventDefault(); simGesture('tap');       break;
    case 'd': case 'D':                    simGesture('double_tap'); break;
    case 'ArrowLeft':  e.preventDefault(); simDir('Left');           break;
    case 'ArrowRight': e.preventDefault(); simDir('Right');          break;
    case 'ArrowUp':    e.preventDefault(); setCrossfade(xfade - 10); break;
    case 'ArrowDown':  e.preventDefault(); setCrossfade(xfade + 10); break;
  }
});

/* ── Drag crossfader ───────────────────────────────────────── */
let dragging = false;
const xfTrack = document.getElementById('xfTrack');

xfTrack.addEventListener('mousedown', (e) => { dragging = true; applyXfDrag(e); });
document.addEventListener('mousemove', (e) => { if (dragging) applyXfDrag(e); });
document.addEventListener('mouseup',   ()  => { dragging = false; });
xfTrack.addEventListener('touchstart', (e) => { dragging = true; applyXfDrag(e.touches[0]); }, { passive: true });
document.addEventListener('touchmove', (e) => { if (dragging) applyXfDrag(e.touches[0]); }, { passive: true });
document.addEventListener('touchend',  ()  => { dragging = false; });

function applyXfDrag(ev) {
  const r = xfTrack.getBoundingClientRect();
  const x = Math.max(0, Math.min(ev.clientX - r.left, r.width));
  setCrossfade(Math.round((x / r.width) * 100));
}

/* ── Status indicator ──────────────────────────────────────── */
function setStatus(connected) {
  document.getElementById('dot').className       = connected ? 'dot live' : 'dot';
  document.getElementById('connLabel').textContent = connected ? 'Connected' : 'Simulated';
}

/* ── Init ──────────────────────────────────────────────────── */
setCrossfade(50);
renderDecks();
</script>
