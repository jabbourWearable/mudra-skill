    <script type="module">
import * as THREE from 'three';
import * as xb from 'xrblocks';

// ────────────────────────────────────────────────────────────────────────
//  MudraClient — verbatim from skill rules (1500 ms timeout, passive mock)
// ────────────────────────────────────────────────────────────────────────
class MudraClient {
  constructor(url) {
    this._handlers = {};
    this._subscriptions = new Set();
    this._timers = [];
    this._status = 'connecting';
    this._notifyStatus('connecting');

    const timeout = setTimeout(() => this._startMock(), 1500);

    try {
      this._ws = new WebSocket(url);
      this._ws.onopen = () => {
        clearTimeout(timeout);
        this._status = 'connected';
        this._notifyStatus('connected');
        this._subscriptions.forEach(sig =>
          this._ws.send(JSON.stringify({ command: 'subscribe', signal: sig }))
        );
      };
      this._ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (this._handlers[msg.type]) this._handlers[msg.type](msg.data);
      };
      this._ws.onclose = () => {
        clearTimeout(timeout);
        if (this._status === 'connected') {
          this._status = 'disconnected-simulated';
          this._notifyStatus('disconnected-simulated');
          this._startMock();
        }
      };
      this._ws.onerror = () => {
        clearTimeout(timeout);
        this._startMock();
      };
    } catch (_) {
      clearTimeout(timeout);
      this._startMock();
    }
  }

  on(signal, fn) { this._handlers[signal] = fn; }

  subscribe(signal) {
    this._subscriptions.add(signal);
    if (this._ws && this._ws.readyState === WebSocket.OPEN) {
      this._ws.send(JSON.stringify({ command: 'subscribe', signal }));
    }
  }

  send(cmd) {
    if (this._ws && this._ws.readyState === WebSocket.OPEN) {
      this._ws.send(JSON.stringify(cmd));
    } else if (cmd.command === 'trigger_gesture') {
      this._dispatchMockGesture(cmd.data.type);
    }
  }

  get status() { return this._status; }

  _notifyStatus(s) {
    if (this._handlers['_status']) this._handlers['_status'](s);
  }

  _emit(payload) {
    if (this._handlers[payload.type]) this._handlers[payload.type](payload.data);
  }

  _dispatchMockGesture(type) {
    this._emit({ type: 'gesture', data: { type, confidence: 0.99, timestamp: Date.now() } });
  }

  _startMock() {
    if (this._status === 'simulated' || this._status === 'disconnected-simulated') return;
    const wasPreviouslyConnected = this._status === 'connected';
    this._status = wasPreviouslyConnected ? 'disconnected-simulated' : 'simulated';
    this._notifyStatus(this._status);
    // Passive mock: sim panel + keyboard are the only signal sources.
  }

  destroy() {
    this._timers.forEach(t => clearInterval(t));
    if (this._ws) this._ws.close();
  }
}

// ────────────────────────────────────────────────────────────────────────
//  Module-scope MudraClient
// ────────────────────────────────────────────────────────────────────────
const mudra = new MudraClient('ws://127.0.0.1:8766');

// ────────────────────────────────────────────────────────────────────────
//  Mudra Car — drive a low-poly car with your band
//  signals: nav_direction (steer/accel/brake), pressure (throttle cap),
//           gesture (tap → horn)
//  motion mode: direction
// ────────────────────────────────────────────────────────────────────────
class MainScript extends xb.Script {
  init() {
    this.applyBackground_solid_studio();

    // Lighting — warm studio key + cool rim
    this.add(new THREE.HemisphereLight(0xffffff, 0x444455, 1.0));
    const key = new THREE.DirectionalLight(0xffeecc, 1.4);
    key.position.set(3, 6, 2);
    this.add(key);
    const rim = new THREE.PointLight(0x88aaff, 1.2, 10);
    rim.position.set(-2, 2, -3);
    this.add(rim);

    // ── Driving pad (a square "parking lot" on top of the studio floor)
    const padSize = 14;
    const pad = new THREE.Mesh(
      new THREE.PlaneGeometry(padSize, padSize),
      new THREE.MeshStandardMaterial({ color: 0x18181c, roughness: 0.95, metalness: 0.0 })
    );
    pad.rotation.x = -Math.PI / 2;
    pad.position.y = 0.002;
    this.add(pad);
    this.padHalf = padSize / 2 - 0.4;

    // Dashed center lines (N-S and E-W) and edge borders
    this.buildRoadMarkings(padSize);

    // Traffic cones around the pad as soft obstacles (visual only)
    this.buildCones(padSize);

    // ── Car rig (a small car, ~0.4 m long, driving on the pad)
    this.car = new THREE.Group();
    this.car.position.set(0, 0, 0);
    this.add(this.car);

    this.buildCar(this.car);

    // Camera-facing viewer is at (0, user.height, 0) looking -Z.
    // The pad is centered at origin. The default car spawn is at (0,0,0) with +Z heading
    // so the car visually sits in front of the viewer (since z=0 is "behind" in xb.user sense,
    // but the viewer is at origin, pad extends ±padHalf, so the scene is visible all around).
    // Move the car slightly forward of origin at start so it's in frame:
    this.car.position.set(0, 0, -xb.user.objectDistance * 1.2);

    // ── Physics / control state
    this.state = {
      speed: 0,          // m/s (signed; negative = reverse)
      heading: 0,        // radians; 0 = facing -Z (forward from viewer)
      steerAngle: 0,     // visual front-wheel tilt (radians), eases to 0
      throttleCap: 0.5,  // 0..1 (normalised pressure)
      distance: 0,       // cumulative travel — drives wheel spin
    };

    // Car performance
    this.maxSpeed = 4.5;   // m/s at full cap
    this.accelStep = 1.0;  // m/s added per Up press (target)
    this.brakeStep = 1.0;  // m/s shed per Down press
    this.steerStep = 0.22; // radians per Left/Right press
    this.drag = 0.6;       // passive deceleration (m/s^2 when coasting)
    this.hornUntil = 0;    // timestamp until which horn visual is active

    // Animation clock
    this.lastT = performance.now() / 1000;

    // ── Mudra wiring ────────────────────────────────────────────────
    mudra.on('_status', (s) => {
      const chip = document.getElementById('mudra-status');
      const labels = {
        'connecting': 'Connecting…',
        'connected': 'Connected',
        'simulated': 'Simulated',
        'disconnected-simulated': 'Disconnected — simulated',
      };
      chip.textContent = labels[s] ?? s;
    });

    mudra.on('nav_direction', (data) => this.handleNavDirection(data));
    mudra.on('pressure',      (data) => this.handlePressure(data));
    mudra.on('gesture',       (data) => this.handleGesture(data));

    mudra.subscribe('nav_direction');
    mudra.subscribe('pressure');
    mudra.subscribe('gesture');

    // Seed throttle cap from the slider initial value
    this.handlePressure({ value: 50, normalized: 0.5, timestamp: Date.now() });

    this.wireSimPanel();
    this.wireKeyboard();
  }

  // ── Scene builders ───────────────────────────────────────────────

  buildRoadMarkings(padSize) {
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffcc66, transparent: true, opacity: 0.75 });
    const edgeMat = new THREE.MeshBasicMaterial({ color: 0xaaccff, transparent: true, opacity: 0.45 });

    // Dashed center lines in both axes
    const dashLen = 0.4, dashGap = 0.4, dashWidth = 0.06;
    const total = padSize - 1.0;
    const count = Math.floor(total / (dashLen + dashGap));
    const startOffset = -(count * (dashLen + dashGap) - dashGap) / 2;

    for (let i = 0; i < count; i++) {
      const z = startOffset + i * (dashLen + dashGap) + dashLen / 2;
      // N-S line (runs along Z, centered on X=0)
      const d1 = new THREE.Mesh(new THREE.PlaneGeometry(dashWidth, dashLen), lineMat);
      d1.rotation.x = -Math.PI / 2;
      d1.position.set(0, 0.005, z);
      this.add(d1);
      // E-W line (runs along X, centered on Z=0)
      const d2 = new THREE.Mesh(new THREE.PlaneGeometry(dashLen, dashWidth), lineMat);
      d2.rotation.x = -Math.PI / 2;
      d2.position.set(z, 0.005, 0);
      this.add(d2);
    }

    // Outer edge border
    const border = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.PlaneGeometry(padSize - 0.2, padSize - 0.2)),
      new THREE.LineBasicMaterial({ color: 0xaaccff, transparent: true, opacity: 0.5 })
    );
    border.rotation.x = -Math.PI / 2;
    border.position.y = 0.006;
    this.add(border);

    // A small "START" chevron painted on the ground in front of the viewer
    const chevMat = new THREE.MeshBasicMaterial({ color: 0x66ccff, transparent: true, opacity: 0.6 });
    for (let i = 0; i < 3; i++) {
      const c = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.06), chevMat);
      c.rotation.x = -Math.PI / 2;
      c.position.set(0, 0.005, -xb.user.objectDistance * 1.2 + 0.5 + i * 0.15);
      this.add(c);
    }
  }

  buildCones(padSize) {
    const coneGeom = new THREE.ConeGeometry(0.08, 0.22, 14);
    const coneMat  = new THREE.MeshStandardMaterial({ color: 0xff7733, roughness: 0.6, metalness: 0.1 });
    const stripeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

    const half = padSize / 2 - 0.6;
    const positions = [];
    const step = 1.4;
    for (let x = -half; x <= half + 0.001; x += step) {
      positions.push([x, -half]);
      positions.push([x,  half]);
    }
    for (let z = -half + step; z <= half - step + 0.001; z += step) {
      positions.push([-half, z]);
      positions.push([ half, z]);
    }

    for (const [x, z] of positions) {
      const cone = new THREE.Mesh(coneGeom, coneMat);
      cone.position.set(x, 0.11, z);
      this.add(cone);
      // White stripe
      const stripe = new THREE.Mesh(
        new THREE.CylinderGeometry(0.062, 0.066, 0.025, 14),
        stripeMat
      );
      stripe.position.set(x, 0.13, z);
      this.add(stripe);
    }
  }

  buildCar(group) {
    // Chassis (a slightly tapered box)
    const chassisMat = new THREE.MeshStandardMaterial({
      color: 0xd8443c, metalness: 0.55, roughness: 0.35,
    });
    this.chassisMat = chassisMat;
    const chassis = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.09, 0.44), chassisMat);
    chassis.position.y = 0.08;
    group.add(chassis);

    // Roof / cabin
    const roofMat = new THREE.MeshStandardMaterial({ color: 0xb93329, metalness: 0.5, roughness: 0.4 });
    const roof = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.07, 0.22), roofMat);
    roof.position.set(0, 0.17, -0.01);
    group.add(roof);

    // Windshield
    const glassMat = new THREE.MeshStandardMaterial({
      color: 0x112233, metalness: 0.9, roughness: 0.15,
      transparent: true, opacity: 0.75,
    });
    const windshield = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.06, 0.03), glassMat);
    windshield.position.set(0, 0.17, -0.13);
    group.add(windshield);
    const rearWindow = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.06, 0.03), glassMat);
    rearWindow.position.set(0, 0.17, 0.11);
    group.add(rearWindow);

    // Headlights (front = -Z in car local frame)
    const headlightMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
    this.headlightMat = headlightMat;
    const hl1 = new THREE.Mesh(new THREE.SphereGeometry(0.025, 10, 8), headlightMat);
    hl1.position.set(-0.075, 0.08, -0.22);
    group.add(hl1);
    const hl2 = new THREE.Mesh(new THREE.SphereGeometry(0.025, 10, 8), headlightMat);
    hl2.position.set( 0.075, 0.08, -0.22);
    group.add(hl2);

    // Headlight beams (cones pointing forward, opacity pulses with horn)
    const beamMat = new THREE.MeshBasicMaterial({
      color: 0xffffaa, transparent: true, opacity: 0.12, side: THREE.DoubleSide,
    });
    this.beamMat = beamMat;
    const beam = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.9, 20, 1, true), beamMat);
    beam.rotation.x = Math.PI / 2; // point along -Z (car forward)
    beam.position.set(0, 0.08, -0.7);
    group.add(beam);

    // Brake lights (rear = +Z)
    const brakeMat = new THREE.MeshBasicMaterial({ color: 0x330000 });
    this.brakeMat = brakeMat;
    const bl1 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, 0.02), brakeMat);
    bl1.position.set(-0.08, 0.09, 0.22);
    group.add(bl1);
    const bl2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, 0.02), brakeMat);
    bl2.position.set( 0.08, 0.09, 0.22);
    group.add(bl2);

    // Wheels — 4 cylinders lying on their side
    const wheelGeom = new THREE.CylinderGeometry(0.05, 0.05, 0.04, 18);
    wheelGeom.rotateZ(Math.PI / 2);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.9, metalness: 0.2 });
    const hubMat   = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.9 });

    this.wheels = [];
    this.frontWheels = [];
    // local offsets: x=±0.12, z=±0.16 (negative z = front)
    const wheelPos = [
      { x: -0.12, z: -0.16, isFront: true  },
      { x:  0.12, z: -0.16, isFront: true  },
      { x: -0.12, z:  0.16, isFront: false },
      { x:  0.12, z:  0.16, isFront: false },
    ];
    for (const wp of wheelPos) {
      const wg = new THREE.Group();
      wg.position.set(wp.x, 0.05, wp.z);
      const wheel = new THREE.Mesh(wheelGeom, wheelMat);
      wg.add(wheel);
      const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.045, 12), hubMat);
      hub.rotation.z = Math.PI / 2;
      wg.add(hub);
      group.add(wg);
      this.wheels.push({ group: wg, mesh: wheel, isFront: wp.isFront });
      if (wp.isFront) this.frontWheels.push(wg);
    }

    // Horn flash sphere above the roof (invisible by default)
    this.hornMat = new THREE.MeshBasicMaterial({ color: 0xffff66, transparent: true, opacity: 0.0 });
    this.horn = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 12), this.hornMat);
    this.horn.position.set(0, 0.3, 0);
    group.add(this.horn);
  }

  // ── Signal handlers ───────────────────────────────────────────────

  handleNavDirection(data) {
    const maxV = this.maxSpeed * this.state.throttleCap;
    const minV = -this.maxSpeed * 0.4 * this.state.throttleCap;  // reverse slower
    switch (data.direction) {
      case 'Up':
        this.state.speed = Math.min(maxV, this.state.speed + this.accelStep);
        break;
      case 'Down':
        this.state.speed = Math.max(minV, this.state.speed - this.brakeStep);
        break;
      case 'Left':
        this.state.heading += this.steerStep;
        this.state.steerAngle = 0.4;
        break;
      case 'Right':
        this.state.heading -= this.steerStep;
        this.state.steerAngle = -0.4;
        break;
      case 'Roll Left':
        this.state.heading += this.steerStep * 2;
        this.state.steerAngle = 0.6;
        break;
      case 'Roll Right':
        this.state.heading -= this.steerStep * 2;
        this.state.steerAngle = -0.6;
        break;
      // 'None' → ignore
    }
  }

  handlePressure(data) {
    const norm = Math.max(0, Math.min(1,
      (typeof data.normalized === 'number') ? data.normalized : (data.value / 100)
    ));
    this.state.throttleCap = norm;

    const slider = document.getElementById('sim-pressure');
    const valEl = document.getElementById('sim-pressure-val');
    const pct = Math.round(norm * 100);
    if (slider && +slider.value !== pct) slider.value = pct;
    if (valEl) valEl.textContent = pct;
  }

  handleGesture(data) {
    if (data.type === 'tap' || data.type === 'double_tap') {
      // Honk the horn
      this.hornUntil = performance.now() / 1000 + (data.type === 'double_tap' ? 0.7 : 0.35);
    } else if (data.type === 'twist') {
      // Flip car 180° — handy for U-turns
      this.state.heading += Math.PI;
    } else if (data.type === 'double_twist') {
      // Emergency stop
      this.state.speed = 0;
    }
  }

  // ── Per-frame update ──────────────────────────────────────────────

  update() {
    const now = performance.now() / 1000;
    let dt = now - this.lastT;
    this.lastT = now;
    if (!(dt > 0) || dt > 0.1) dt = 1 / 60;

    const s = this.state;

    // Passive drag toward zero when no input recently
    if (s.speed > 0) s.speed = Math.max(0, s.speed - this.drag * dt);
    else if (s.speed < 0) s.speed = Math.min(0, s.speed + this.drag * dt);

    // Clamp by current throttle cap
    const maxV = this.maxSpeed * s.throttleCap;
    const minV = -this.maxSpeed * 0.4 * s.throttleCap;
    if (s.speed >  maxV) s.speed = maxV;
    if (s.speed <  minV) s.speed = minV;

    // Forward in the car's local frame is -Z, so world forward after heading rotation:
    //   fwd_x = -sin(heading), fwd_z = -cos(heading)
    const dx = -Math.sin(s.heading) * s.speed * dt;
    const dz = -Math.cos(s.heading) * s.speed * dt;

    this.car.position.x += dx;
    this.car.position.z += dz;

    // Soft wrap: when car leaves pad, bounce-wrap it to the opposite edge
    if (this.car.position.x >  this.padHalf) this.car.position.x = -this.padHalf;
    if (this.car.position.x < -this.padHalf) this.car.position.x =  this.padHalf;
    if (this.car.position.z >  this.padHalf) this.car.position.z = -this.padHalf;
    if (this.car.position.z < -this.padHalf) this.car.position.z =  this.padHalf;

    this.car.rotation.y = s.heading;

    // Accumulate distance for wheel spin
    s.distance += s.speed * dt;
    const wheelRot = s.distance / 0.05;  // radius ≈ 0.05
    for (const w of this.wheels) {
      w.mesh.rotation.x = wheelRot;
    }

    // Ease front-wheel steering visual back to 0
    s.steerAngle *= Math.pow(0.001, dt);  // exponential decay
    for (const fw of this.frontWheels) {
      fw.rotation.y = s.steerAngle;
    }

    // Brake lights: glow when decelerating or at rest with recent input
    if (this.brakeMat) {
      const braking = Math.abs(s.speed) < 0.05 || (s.speed > 0 && s.speed < maxV * 0.3);
      this.brakeMat.color.setRGB(braking ? 0.9 : 0.2, 0, 0);
    }

    // Headlight intensity follows throttle cap (simulates "engine hot")
    if (this.headlightMat) {
      const h = 0.5 + s.throttleCap * 0.5;
      this.headlightMat.color.setRGB(h, h, h * 0.9);
    }
    if (this.beamMat) {
      this.beamMat.opacity = 0.06 + s.throttleCap * 0.18;
    }

    // Horn flash (pulse)
    if (this.hornMat) {
      const active = now < this.hornUntil;
      if (active) {
        const pulse = 0.5 + 0.5 * Math.sin(now * 40);
        this.hornMat.opacity = 0.3 + pulse * 0.5;
      } else {
        this.hornMat.opacity = Math.max(0, this.hornMat.opacity - dt * 3);
      }
    }

    // HUD readouts
    const speedEl = document.getElementById('speed-val');
    const capEl = document.getElementById('cap-val');
    const headEl = document.getElementById('head-val');
    if (speedEl) speedEl.textContent = `${s.speed.toFixed(2)} m/s`;
    if (capEl)   capEl.textContent = `${Math.round(s.throttleCap * 100)}%`;
    if (headEl) {
      let deg = ((s.heading * 180 / Math.PI) % 360 + 360) % 360;
      headEl.textContent = `${deg.toFixed(0)}°`;
    }
  }

  // ── Sim panel + keyboard wiring ───────────────────────────────────

  wireSimPanel() {
    const self = this;
    document.querySelectorAll('#mudra-sim button[data-d]').forEach(btn => {
      btn.addEventListener('click', () => {
        self.handleNavDirection({ direction: btn.dataset.d, timestamp: Date.now() });
      });
    });
    document.querySelectorAll('#mudra-sim button[data-g]').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.g;
        mudra.send({ command: 'trigger_gesture', data: { type } });
        self.handleGesture({ type, confidence: 1.0, timestamp: Date.now() });
      });
    });
    const slider = document.getElementById('sim-pressure');
    const valEl = document.getElementById('sim-pressure-val');
    slider.addEventListener('input', () => {
      const v = +slider.value;
      valEl.textContent = v;
      self.handlePressure({ value: v, normalized: v / 100, timestamp: Date.now() });
    });
  }

  wireKeyboard() {
    const self = this;
    let kbPressure = 50;
    const setPressure = (v) => {
      kbPressure = Math.max(0, Math.min(100, v));
      self.handlePressure({ value: kbPressure, normalized: kbPressure / 100, timestamp: Date.now() });
    };

    window.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'ArrowUp':
          e.stopPropagation();
          self.handleNavDirection({ direction: 'Up', timestamp: Date.now() });
          break;
        case 'ArrowDown':
          e.stopPropagation();
          self.handleNavDirection({ direction: 'Down', timestamp: Date.now() });
          break;
        case 'ArrowLeft':
          e.stopPropagation();
          self.handleNavDirection({ direction: 'Left', timestamp: Date.now() });
          break;
        case 'ArrowRight':
          e.stopPropagation();
          self.handleNavDirection({ direction: 'Right', timestamp: Date.now() });
          break;
        case 'BracketLeft':
          e.stopPropagation();
          setPressure(kbPressure - 10);
          break;
        case 'BracketRight':
          e.stopPropagation();
          setPressure(kbPressure + 10);
          break;
        case 'Space':
          e.stopPropagation();
          mudra.send({ command: 'trigger_gesture', data: { type: 'tap' } });
          self.handleGesture({ type: 'tap', confidence: 1.0, timestamp: Date.now() });
          break;
      }
    }, { capture: true });
  }

  // ── Background helper (verbatim from Section 14 catalog) ──────────
  applyBackground_solid_studio() {
    // Dark neutral dome
    const domeGeom = new THREE.SphereGeometry(80, 32, 16);
    const domeMat = new THREE.MeshBasicMaterial({ color: 0x1a1a22, side: THREE.BackSide });
    this.add(new THREE.Mesh(domeGeom, domeMat));

    // Subtle floor for grounding
    const floorGeom = new THREE.PlaneGeometry(10, 10);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a32, roughness: 0.9, metalness: 0.1 });
    const floor = new THREE.Mesh(floorGeom, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    this.add(floor);
  }
}

document.addEventListener('DOMContentLoaded', function () {
  xb.add(new MainScript());
  xb.init(new xb.Options());
});
