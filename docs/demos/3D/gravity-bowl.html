<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gravity Bowl | Mudra XR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
  <script>window.litDisableBundleWarning = true;</script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
      "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
      "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
    }
  }
  </script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; color: #fff; }

    #mudra-status {
      position: fixed; top: 8px; right: 12px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 0.8rem; font-family: system-ui, sans-serif;
      background: rgba(0,0,0,0.6); color: #fff; z-index: 9999;
      border: 1px solid rgba(0,255,204,0.4);
    }

    #hud {
      position: fixed; top: 8px; left: 12px;
      padding: 6px 12px; border-radius: 8px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-family: 'Monaco','Menlo',monospace; font-size: 0.8rem;
      z-index: 9999; border: 1px solid rgba(0,255,204,0.3); min-width: 150px;
    }
    #hud .row { display: flex; justify-content: space-between; gap: 12px; margin: 2px 0; }
    #hud .lbl { color: #66ccaa; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; }
    #hud .val { color: #00ffcc; }

    #mudra-sim {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
      padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 8px;
      z-index: 9999; align-items: center;
      border-top: 1px solid rgba(0,255,204,0.3);
    }
    #mudra-sim .group {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    }
    #mudra-sim .glabel { color: #00ffcc; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; margin-right: 2px; }
    #mudra-sim button {
      background: rgba(0,255,204,0.12); color: #fff;
      border: 1px solid rgba(0,255,204,0.4); border-radius: 4px;
      padding: 4px 9px; font-size: 0.76rem; cursor: pointer; font-family: inherit;
      transition: background 0.12s;
    }
    #mudra-sim button:hover { background: rgba(0,255,204,0.28); }
    #mudra-sim input[type="range"] { width: 120px; accent-color: #00ffcc; }
    #mudra-sim .pval { color: #00ffcc; font-size: 0.76rem; width: 26px; text-align: right; font-family: monospace; }
    #help { color: #669988; font-size: 0.68rem; margin-left: auto; opacity: 0.85; }
    #help kbd {
      background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 3px;
      font-family: monospace; color: #00ffcc; border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div id="mudra-status">Connecting…</div>

  <div id="hud">
    <div class="row"><span class="lbl">Balls</span><span class="val" id="hud-balls">4</span></div>
    <div class="row"><span class="lbl">Tilt X,Z</span><span class="val" id="hud-tilt">0.00, 0.00</span></div>
    <div class="row"><span class="lbl">Magnet</span><span class="val" id="hud-mag">0%</span></div>
  </div>

  <div id="mudra-sim">
    <div class="group">
      <span class="glabel">Tilt</span>
      <button data-tilt="left">← Left</button>
      <button data-tilt="right">→ Right</button>
      <button data-tilt="fwd">↑ Fwd</button>
      <button data-tilt="back">↓ Back</button>
      <button data-tilt="flat">● Flat</button>
    </div>
    <div class="group">
      <span class="glabel">Pressure</span>
      <input id="sim-pressure" type="range" min="0" max="100" value="0" />
      <span id="sim-pressure-val" class="pval">0</span>
    </div>
    <div class="group">
      <span class="glabel">Gesture</span>
      <button data-g="tap">Tap +Ball</button>
      <button data-g="double_tap">2Tap Reset</button>
      <button data-g="twist">Twist Kick</button>
    </div>
    <div id="help">
      <kbd>←</kbd><kbd>→</kbd><kbd>↑</kbd><kbd>↓</kbd> tilt &nbsp;
      <kbd>Space</kbd> spawn ball &nbsp; <kbd>[</kbd><kbd>]</kbd> magnet
    </div>
  </div>

  <script type="module">
import * as THREE from 'three';
import * as xb from 'xrblocks';

// ─── MudraClient (verbatim) ──────────────────────────────────────────────────
class MudraClient {
  constructor(url) {
    this._handlers = {};
    this._subscriptions = new Set();
    this._timers = [];
    this._status = 'connecting';
    this._notifyStatus('connecting');
    const timeout = setTimeout(() => this._startMock(), 1500);
    try {
      this._ws = new WebSocket(url);
      this._ws.onopen = () => {
        clearTimeout(timeout);
        this._status = 'connected';
        this._notifyStatus('connected');
        this._subscriptions.forEach(sig =>
          this._ws.send(JSON.stringify({ command: 'subscribe', signal: sig }))
        );
      };
      this._ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (this._handlers[msg.type]) this._handlers[msg.type](msg.data);
      };
      this._ws.onclose = () => {
        clearTimeout(timeout);
        if (this._status === 'connected') {
          this._status = 'disconnected-simulated';
          this._notifyStatus('disconnected-simulated');
          this._startMock();
        }
      };
      this._ws.onerror = () => { clearTimeout(timeout); this._startMock(); };
    } catch (_) { clearTimeout(timeout); this._startMock(); }
  }
  on(signal, fn) { this._handlers[signal] = fn; }
  subscribe(signal) {
    this._subscriptions.add(signal);
    if (this._ws && this._ws.readyState === WebSocket.OPEN)
      this._ws.send(JSON.stringify({ command: 'subscribe', signal }));
  }
  send(cmd) {
    if (this._ws && this._ws.readyState === WebSocket.OPEN)
      this._ws.send(JSON.stringify(cmd));
    else if (cmd.command === 'trigger_gesture')
      this._emit({ type: 'gesture', data: { type: cmd.data.type, confidence: 0.99, timestamp: Date.now() } });
  }
  get status() { return this._status; }
  _notifyStatus(s) { if (this._handlers['_status']) this._handlers['_status'](s); }
  _emit(payload) { if (this._handlers[payload.type]) this._handlers[payload.type](payload.data); }
  _dispatchMockGesture(type) {
    this._emit({ type: 'gesture', data: { type, confidence: 0.99, timestamp: Date.now() } });
  }
  _startMock() {
    if (this._status === 'simulated' || this._status === 'disconnected-simulated') return;
    const wasPreviouslyConnected = this._status === 'connected';
    this._status = wasPreviouslyConnected ? 'disconnected-simulated' : 'simulated';
    this._notifyStatus(this._status);
  }
  destroy() { this._timers.forEach(t => clearInterval(t)); if (this._ws) this._ws.close(); }
}

const mudra = new MudraClient('ws://127.0.0.1:8766');

// ─── App ─────────────────────────────────────────────────────────────────────
// signals: imu_acc (gravity tilt), pressure (magnetic attraction), gesture (spawn/reset/kick)
// motion mode: IMU
class MainScript extends xb.Script {
  init() {
    this.applyBackground_grid_cyber();

    this.add(new THREE.AmbientLight(0x112233, 2.5));
    const key = new THREE.DirectionalLight(0x00ffcc, 2.2);
    key.position.set(2, 5, 2);
    this.add(key);
    this.glowLight = new THREE.PointLight(0x00ffcc, 1.5, 5);
    this.glowLight.position.set(0, 0.6, -xb.user.objectDistance);
    this.add(this.glowLight);

    // Bowl — wireframe south hemisphere + glowing rim
    this.bowlRadius = 0.82;
    this.bowlCenter = new THREE.Vector3(0, 0.6, -xb.user.objectDistance);

    const bowlGeom = new THREE.SphereGeometry(
      this.bowlRadius, 40, 20, 0, Math.PI * 2, Math.PI * 0.5, Math.PI * 0.5
    );
    const bowlMesh = new THREE.Mesh(bowlGeom,
      new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.28 })
    );
    bowlMesh.position.copy(this.bowlCenter);
    this.add(bowlMesh);

    // Rim glow ring
    const rim = new THREE.Mesh(
      new THREE.TorusGeometry(this.bowlRadius, 0.013, 8, 72),
      new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.9 })
    );
    rim.position.copy(this.bowlCenter);
    this.add(rim);

    // State
    this.balls = [];
    this.ballMeshes = [];
    this.gravDir = new THREE.Vector3(0, -1, 0);
    this.magnetStrength = 0;
    this.lastT = performance.now() / 1000;
    this.palette = [0xff3366, 0x33ffaa, 0xffcc00, 0x9966ff, 0x00ccff, 0xff7722, 0x66ff44, 0xff44ff];

    for (let i = 0; i < 4; i++) this.spawnBall();

    // Mudra wiring
    mudra.on('_status', (s) => {
      const L = { connecting:'Connecting…', connected:'Connected', simulated:'Simulated', 'disconnected-simulated':'Disconnected — simulated' };
      document.getElementById('mudra-status').textContent = L[s] ?? s;
    });
    mudra.on('imu_acc',  (d) => this.handleImuAcc(d));
    mudra.on('pressure', (d) => this.handlePressure(d));
    mudra.on('gesture',  (d) => this.handleGesture(d));
    mudra.subscribe('imu_acc');
    mudra.subscribe('pressure');
    mudra.subscribe('gesture');

    this.wireSimPanel();
    this.wireKeyboard();
  }

  spawnBall() {
    if (this.balls.length >= 8) return;
    const angle = Math.random() * Math.PI * 2;
    const r = this.bowlRadius * 0.28 * Math.random();
    const color = this.palette[this.balls.length % this.palette.length];
    const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.45, roughness: 0.1, metalness: 0.88 });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 12), mat);
    const pos = new THREE.Vector3(
      this.bowlCenter.x + Math.cos(angle) * r,
      this.bowlCenter.y - this.bowlRadius * 0.05,
      this.bowlCenter.z + Math.sin(angle) * r
    );
    mesh.position.copy(pos);
    this.add(mesh);
    this.balls.push({ pos: pos.clone(), vel: new THREE.Vector3(), mat });
    this.ballMeshes.push(mesh);
    document.getElementById('hud-balls').textContent = this.balls.length;
  }

  handleImuAcc(data) {
    const ax = (data.values[0] ?? 0), az = (data.values[2] ?? 0);
    const tx = ax * 0.13, tz = az * 0.13;
    this.gravDir.set(tx, -1, tz).normalize();
    document.getElementById('hud-tilt').textContent = `${tx.toFixed(2)}, ${tz.toFixed(2)}`;
  }

  handlePressure(data) {
    const n = typeof data.normalized === 'number' ? data.normalized : data.value / 100;
    this.magnetStrength = Math.max(0, Math.min(1, n));
    document.getElementById('hud-mag').textContent = `${Math.round(n * 100)}%`;
    const sl = document.getElementById('sim-pressure'), vl = document.getElementById('sim-pressure-val');
    const p = Math.round(n * 100);
    if (sl && +sl.value !== p) sl.value = p;
    if (vl) vl.textContent = p;
  }

  handleGesture(data) {
    if (data.type === 'tap') {
      this.spawnBall();
    } else if (data.type === 'double_tap') {
      while (this.balls.length > 4) {
        this.remove(this.ballMeshes.pop());
        this.balls.pop();
      }
      document.getElementById('hud-balls').textContent = this.balls.length;
    } else if (data.type === 'twist') {
      for (const b of this.balls) {
        b.vel.add(new THREE.Vector3(
          (Math.random() - 0.5) * 3.8,
          (Math.random() - 0.5) * 3.8,
          (Math.random() - 0.5) * 3.8
        ));
      }
    }
  }

  update() {
    const now = performance.now() / 1000;
    let dt = now - this.lastT; this.lastT = now;
    if (!(dt > 0) || dt > 0.1) dt = 1 / 60;

    const G = 3.4, ballR = 0.055, bowlR = this.bowlRadius - ballR;
    const C = this.bowlCenter;

    for (let i = 0; i < this.balls.length; i++) {
      const b = this.balls[i];

      b.vel.addScaledVector(this.gravDir, G * dt);

      if (this.magnetStrength > 0.01) {
        const toC = new THREE.Vector3(C.x, C.y - bowlR * 0.45, C.z).sub(b.pos);
        b.vel.addScaledVector(toC.normalize(), this.magnetStrength * 5.5 * dt);
      }

      b.pos.addScaledVector(b.vel, dt);

      // Sphere bowl constraint
      const rel = b.pos.clone().sub(C);
      const dist = rel.length();
      if (dist > bowlR) {
        const n = rel.clone().normalize();
        b.pos.copy(C).addScaledVector(n, bowlR);
        const vDotN = b.vel.dot(n);
        if (vDotN > 0) b.vel.addScaledVector(n, -1.8 * vDotN);
        b.vel.multiplyScalar(0.7);
      }

      // Cap above bowl rim
      if (b.pos.y > C.y + 0.04) {
        b.pos.y = C.y + 0.04;
        if (b.vel.y > 0) b.vel.y *= -0.5;
      }

      b.vel.multiplyScalar(Math.pow(0.06, dt));
      b.mat.emissiveIntensity = 0.35 + Math.min(1.1, b.vel.length() * 0.38);
      this.ballMeshes[i].position.copy(b.pos);
    }

    const avgSpeed = this.balls.reduce((s, b) => s + b.vel.length(), 0) / Math.max(1, this.balls.length);
    this.glowLight.intensity = 0.8 + Math.min(1.6, avgSpeed * 0.45);
  }

  wireSimPanel() {
    const tiltMap = {
      left:  [-8, 9.81, 0], right: [8, 9.81, 0],
      fwd:   [0, 9.81, 8],  back:  [0, 9.81, -8],
      flat:  [0, 9.81, 0],
    };
    document.querySelectorAll('#mudra-sim button[data-tilt]').forEach(btn => {
      btn.addEventListener('click', () => {
        const [ax, ay, az] = tiltMap[btn.dataset.tilt] ?? [0, 9.81, 0];
        this.handleImuAcc({ values: [ax, ay, az], frequency: 1125, timestamp: Date.now() });
      });
    });
    document.querySelectorAll('#mudra-sim button[data-g]').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.g;
        mudra.send({ command: 'trigger_gesture', data: { type } });
        this.handleGesture({ type, confidence: 1.0, timestamp: Date.now() });
      });
    });
    const sl = document.getElementById('sim-pressure'), vl = document.getElementById('sim-pressure-val');
    sl.addEventListener('input', () => {
      const v = +sl.value; vl.textContent = v;
      this.handlePressure({ value: v, normalized: v / 100, timestamp: Date.now() });
    });
  }

  wireKeyboard() {
    let kbP = 0;
    window.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'ArrowLeft':  e.stopPropagation(); this.handleImuAcc({ values: [-8, 9.81, 0], frequency: 1125, timestamp: Date.now() }); break;
        case 'ArrowRight': e.stopPropagation(); this.handleImuAcc({ values: [ 8, 9.81, 0], frequency: 1125, timestamp: Date.now() }); break;
        case 'ArrowUp':    e.stopPropagation(); this.handleImuAcc({ values: [0, 9.81,  8], frequency: 1125, timestamp: Date.now() }); break;
        case 'ArrowDown':  e.stopPropagation(); this.handleImuAcc({ values: [0, 9.81, -8], frequency: 1125, timestamp: Date.now() }); break;
        case 'Space':
          e.stopPropagation();
          mudra.send({ command: 'trigger_gesture', data: { type: 'tap' } });
          this.handleGesture({ type: 'tap', confidence: 1.0, timestamp: Date.now() });
          break;
        case 'BracketLeft':
          e.stopPropagation();
          kbP = Math.max(0, kbP - 10);
          this.handlePressure({ value: kbP, normalized: kbP / 100, timestamp: Date.now() });
          break;
        case 'BracketRight':
          e.stopPropagation();
          kbP = Math.min(100, kbP + 10);
          this.handlePressure({ value: kbP, normalized: kbP / 100, timestamp: Date.now() });
          break;
      }
    }, { capture: true });
  }

  applyBackground_grid_cyber() {
    const domeGeom = new THREE.SphereGeometry(80, 32, 16);
    const domeMat = new THREE.MeshBasicMaterial({ color: 0x050014, side: THREE.BackSide });
    this.add(new THREE.Mesh(domeGeom, domeMat));
    const grid = new THREE.GridHelper(40, 40, 0xff00ff, 0x00ffff);
    grid.position.y = 0;
    this.add(grid);
    const horizonGeom = new THREE.RingGeometry(19.8, 20, 64);
    const horizonMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
    const horizon = new THREE.Mesh(horizonGeom, horizonMat);
    horizon.rotation.x = -Math.PI / 2;
    horizon.position.y = 0.01;
    this.add(horizon);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  xb.add(new MainScript());
  xb.init(new xb.Options());
});
  </script>
</body>
</html>
