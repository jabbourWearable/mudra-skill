<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bubble Garden | Mudra XR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
  <script>window.litDisableBundleWarning = true;</script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
      "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
      "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
    }
  }
  </script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; color: #fff; }

    #mudra-status {
      position: fixed; top: 8px; right: 12px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 0.8rem; font-family: system-ui, sans-serif;
      background: rgba(0,0,0,0.6); color: #fff; z-index: 9999;
      border: 1px solid rgba(180,120,255,0.4);
    }

    #hud {
      position: fixed; top: 8px; left: 12px;
      padding: 6px 12px; border-radius: 8px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-family: 'Monaco','Menlo',monospace; font-size: 0.8rem;
      z-index: 9999; border: 1px solid rgba(180,120,255,0.3); min-width: 150px;
    }
    #hud .row { display: flex; justify-content: space-between; gap: 12px; margin: 2px 0; }
    #hud .lbl { color: #aa88cc; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; }
    #hud .val { color: #cc99ff; }

    #mudra-sim {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
      padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 8px;
      z-index: 9999; align-items: center;
      border-top: 1px solid rgba(180,120,255,0.3);
    }
    #mudra-sim .group {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    }
    #mudra-sim .glabel { color: #cc99ff; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; margin-right: 2px; }
    #mudra-sim button {
      background: rgba(180,120,255,0.12); color: #fff;
      border: 1px solid rgba(180,120,255,0.4); border-radius: 4px;
      padding: 4px 9px; font-size: 0.76rem; cursor: pointer; font-family: inherit;
      transition: background 0.12s;
    }
    #mudra-sim button:hover { background: rgba(180,120,255,0.28); }
    #mudra-sim input[type="range"] { width: 120px; accent-color: #cc99ff; }
    #mudra-sim .pval { color: #cc99ff; font-size: 0.76rem; width: 26px; text-align: right; font-family: monospace; }
    #help { color: #887799; font-size: 0.68rem; margin-left: auto; opacity: 0.85; }
    #help kbd {
      background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 3px;
      font-family: monospace; color: #cc99ff; border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div id="mudra-status">Connecting…</div>

  <div id="hud">
    <div class="row"><span class="lbl">Bubbles</span><span class="val" id="hud-count">0</span></div>
    <div class="row"><span class="lbl">Held size</span><span class="val" id="hud-size">4cm</span></div>
    <div class="row"><span class="lbl">Popped</span><span class="val" id="hud-popped">0</span></div>
  </div>

  <div id="mudra-sim">
    <div class="group">
      <span class="glabel">Grow</span>
      <input id="sim-pressure" type="range" min="0" max="100" value="0" />
      <span id="sim-pressure-val" class="pval">0</span>
    </div>
    <div class="group">
      <span class="glabel">Gesture</span>
      <button data-g="tap">Tap Pop</button>
      <button data-g="twist">Twist Release</button>
      <button data-g="double_tap">2Tap Pop All</button>
    </div>
    <div id="help">
      <kbd>[</kbd><kbd>]</kbd> grow &nbsp;
      <kbd>Space</kbd> pop nearest &nbsp;
      <kbd>T</kbd> release bubble
    </div>
  </div>

  <script type="module">
import * as THREE from 'three';
import * as xb from 'xrblocks';

// ─── MudraClient (verbatim) ──────────────────────────────────────────────────
class MudraClient {
  constructor(url) {
    this._handlers = {};
    this._subscriptions = new Set();
    this._timers = [];
    this._status = 'connecting';
    this._notifyStatus('connecting');
    const timeout = setTimeout(() => this._startMock(), 1500);
    try {
      this._ws = new WebSocket(url);
      this._ws.onopen = () => {
        clearTimeout(timeout);
        this._status = 'connected';
        this._notifyStatus('connected');
        this._subscriptions.forEach(sig =>
          this._ws.send(JSON.stringify({ command: 'subscribe', signal: sig }))
        );
      };
      this._ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (this._handlers[msg.type]) this._handlers[msg.type](msg.data);
      };
      this._ws.onclose = () => {
        clearTimeout(timeout);
        if (this._status === 'connected') {
          this._status = 'disconnected-simulated';
          this._notifyStatus('disconnected-simulated');
          this._startMock();
        }
      };
      this._ws.onerror = () => { clearTimeout(timeout); this._startMock(); };
    } catch (_) { clearTimeout(timeout); this._startMock(); }
  }
  on(signal, fn) { this._handlers[signal] = fn; }
  subscribe(signal) {
    this._subscriptions.add(signal);
    if (this._ws && this._ws.readyState === WebSocket.OPEN)
      this._ws.send(JSON.stringify({ command: 'subscribe', signal }));
  }
  send(cmd) {
    if (this._ws && this._ws.readyState === WebSocket.OPEN)
      this._ws.send(JSON.stringify(cmd));
    else if (cmd.command === 'trigger_gesture')
      this._emit({ type: 'gesture', data: { type: cmd.data.type, confidence: 0.99, timestamp: Date.now() } });
  }
  get status() { return this._status; }
  _notifyStatus(s) { if (this._handlers['_status']) this._handlers['_status'](s); }
  _emit(payload) { if (this._handlers[payload.type]) this._handlers[payload.type](payload.data); }
  _dispatchMockGesture(type) {
    this._emit({ type: 'gesture', data: { type, confidence: 0.99, timestamp: Date.now() } });
  }
  _startMock() {
    if (this._status === 'simulated' || this._status === 'disconnected-simulated') return;
    const wasPreviouslyConnected = this._status === 'connected';
    this._status = wasPreviouslyConnected ? 'disconnected-simulated' : 'simulated';
    this._notifyStatus(this._status);
  }
  destroy() { this._timers.forEach(t => clearInterval(t)); if (this._ws) this._ws.close(); }
}

const mudra = new MudraClient('ws://127.0.0.1:8766');

// ─── App ─────────────────────────────────────────────────────────────────────
// signals: pressure (grow held bubble), gesture (pop / release / pop-all)
// motion mode: none
const MAX_BUBBLES = 12;
const SPHERE_GEO = new THREE.SphereGeometry(1, 22, 16); // unit sphere, scale drives size

class MainScript extends xb.Script {
  init() {
    this.applyBackground_gradient_sky();

    this.add(new THREE.AmbientLight(0x99aaff, 2.2));
    const sun = new THREE.DirectionalLight(0xffeedd, 1.6);
    sun.position.set(3, 8, -2);
    this.add(sun);
    const fill = new THREE.HemisphereLight(0x8899ff, 0xffcc88, 0.8);
    this.add(fill);

    this.floatingBubbles = [];  // { mesh, mat, radius, colorOffset, vel, phase, born }
    this.pops = [];             // { mesh, mat, ring, ringMat, startTime, radius }
    this.heldSize = 0.04;
    this.totalPopped = 0;
    this.lastT = performance.now() / 1000;

    // Held bubble — always visible, center of view, size driven by pressure
    this.heldMat = new THREE.MeshBasicMaterial({
      color: 0xbbddff, transparent: true, opacity: 0.35,
      side: THREE.DoubleSide, depthWrite: false,
    });
    this.heldBubble = new THREE.Mesh(SPHERE_GEO, this.heldMat);
    this.heldBubble.position.set(0, xb.user.height * 0.88, -xb.user.objectDistance * 0.55);
    this.heldBubble.scale.setScalar(this.heldSize);
    this.add(this.heldBubble);

    // Held bubble outline ring
    this.heldRingMat = new THREE.MeshBasicMaterial({
      color: 0xcc99ff, transparent: true, opacity: 0.7, side: THREE.DoubleSide,
    });
    this.heldRing = new THREE.Mesh(new THREE.TorusGeometry(1, 0.04, 6, 36), this.heldRingMat);
    this.heldRing.position.copy(this.heldBubble.position);
    this.add(this.heldRing);

    // Mudra wiring
    mudra.on('_status', (s) => {
      const L = { connecting:'Connecting…', connected:'Connected', simulated:'Simulated', 'disconnected-simulated':'Disconnected — simulated' };
      document.getElementById('mudra-status').textContent = L[s] ?? s;
    });
    mudra.on('pressure', (d) => this.handlePressure(d));
    mudra.on('gesture',  (d) => this.handleGesture(d));
    mudra.subscribe('pressure');
    mudra.subscribe('gesture');

    // Spawn a few ambient bubbles to start
    for (let i = 0; i < 5; i++) this.spawnAmbientBubble();

    this.wireSimPanel();
    this.wireKeyboard();
  }

  spawnAmbientBubble() {
    if (this.floatingBubbles.length >= MAX_BUBBLES) return;
    const radius = 0.04 + Math.random() * 0.16;
    const colorOffset = Math.random();
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(colorOffset, 0.75, 0.65),
      transparent: true, opacity: 0.28,
      side: THREE.DoubleSide, depthWrite: false,
    });
    const mesh = new THREE.Mesh(SPHERE_GEO, mat);
    const x = (Math.random() - 0.5) * 1.8;
    const y = xb.user.height * 0.3 + Math.random() * xb.user.height * 0.8;
    const z = -xb.user.objectDistance * (0.5 + Math.random() * 1.2);
    mesh.position.set(x, y, z);
    mesh.scale.setScalar(radius);
    this.add(mesh);
    this.floatingBubbles.push({
      mesh, mat, radius, colorOffset,
      vel: new THREE.Vector3((Math.random()-0.5)*0.04, 0.06 + Math.random()*0.08, (Math.random()-0.5)*0.025),
      phase: Math.random() * Math.PI * 2,
    });
    document.getElementById('hud-count').textContent = this.floatingBubbles.length;
  }

  releaseBubble() {
    if (this.floatingBubbles.length >= MAX_BUBBLES) return;
    const radius = this.heldSize;
    const colorOffset = Math.random();
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(colorOffset, 0.8, 0.68),
      transparent: true, opacity: 0.32,
      side: THREE.DoubleSide, depthWrite: false,
    });
    const mesh = new THREE.Mesh(SPHERE_GEO, mat);
    const hp = this.heldBubble.position;
    mesh.position.set(hp.x + (Math.random()-0.5)*0.1, hp.y, hp.z + (Math.random()-0.5)*0.08);
    mesh.scale.setScalar(radius);
    this.add(mesh);
    this.floatingBubbles.push({
      mesh, mat, radius, colorOffset,
      vel: new THREE.Vector3((Math.random()-0.5)*0.06, 0.08 + Math.random()*0.1, (Math.random()-0.5)*0.04),
      phase: Math.random() * Math.PI * 2,
    });
    // Reset held
    this.heldSize = 0.04;
    this.heldBubble.scale.setScalar(this.heldSize);
    document.getElementById('hud-size').textContent = `4cm`;
    document.getElementById('hud-count').textContent = this.floatingBubbles.length;
  }

  handlePressure(data) {
    const n = typeof data.normalized === 'number' ? data.normalized : data.value / 100;
    this.heldSize = 0.04 + n * 0.38;
    this.heldBubble.scale.setScalar(this.heldSize);
    this.heldRing.scale.setScalar(this.heldSize * 1.1);
    document.getElementById('hud-size').textContent = `${Math.round(this.heldSize * 100)}cm`;
    // Held bubble color cycles with pressure
    this.heldMat.color.setHSL(n * 0.75, 0.8, 0.65);
    const sl = document.getElementById('sim-pressure'), vl = document.getElementById('sim-pressure-val');
    const p = Math.round(n * 100);
    if (sl && +sl.value !== p) sl.value = p;
    if (vl) vl.textContent = p;
  }

  handleGesture(data) {
    if (data.type === 'tap') {
      this.popNearest();
    } else if (data.type === 'twist') {
      this.releaseBubble();
    } else if (data.type === 'double_tap') {
      this.popAll();
    }
  }

  popNearest() {
    if (this.floatingBubbles.length === 0) return;
    const ref = this.heldBubble.position;
    let ni = 0, nd = Infinity;
    for (let i = 0; i < this.floatingBubbles.length; i++) {
      const d = this.floatingBubbles[i].mesh.position.distanceTo(ref);
      if (d < nd) { nd = d; ni = i; }
    }
    this.popBubbleAt(ni);
  }

  popAll() {
    for (let i = this.floatingBubbles.length - 1; i >= 0; i--) {
      this.popBubbleAt(i);
    }
  }

  popBubbleAt(idx) {
    const b = this.floatingBubbles[idx];
    this.totalPopped++;
    document.getElementById('hud-popped').textContent = this.totalPopped;

    // Pop ring
    const ringMat = new THREE.MeshBasicMaterial({
      color: b.mat.color.clone(), transparent: true, opacity: 0.85, side: THREE.DoubleSide,
    });
    const ring = new THREE.Mesh(new THREE.RingGeometry(b.radius * 0.85, b.radius, 32), ringMat);
    ring.position.copy(b.mesh.position);
    ring.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI * 0.5, 0);
    this.add(ring);

    // Second ring for sparkle
    const ring2Mat = new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.6, side: THREE.DoubleSide,
    });
    const ring2 = new THREE.Mesh(new THREE.RingGeometry(b.radius * 0.5, b.radius * 0.65, 32), ring2Mat);
    ring2.position.copy(b.mesh.position);
    ring2.rotation.set(0, Math.random() * Math.PI, Math.random() * Math.PI);
    this.add(ring2);

    this.remove(b.mesh);
    this.floatingBubbles.splice(idx, 1);
    document.getElementById('hud-count').textContent = this.floatingBubbles.length;

    this.pops.push({ ring, ringMat, ring2, ring2Mat, startTime: performance.now() / 1000, radius: b.radius });
  }

  update() {
    const now = performance.now() / 1000;
    let dt = now - this.lastT; this.lastT = now;
    if (!(dt > 0) || dt > 0.1) dt = 1 / 60;

    const ceiling = xb.user.height + 2.8;

    // Float bubbles upward + sway + iridescent color
    const toRemove = [];
    for (let i = 0; i < this.floatingBubbles.length; i++) {
      const b = this.floatingBubbles[i];
      b.mesh.position.addScaledVector(b.vel, dt);
      b.mesh.position.x += Math.sin(now * 0.65 + b.phase) * 0.012;

      // Iridescent color cycling
      const hue = (b.colorOffset + now * 0.1) % 1;
      b.mat.color.setHSL(hue, 0.8, 0.65);
      b.mat.opacity = 0.28 + 0.08 * Math.sin(now * 1.2 + b.phase);

      // Remove if above ceiling
      if (b.mesh.position.y > ceiling) toRemove.push(i);
    }
    for (let i = toRemove.length - 1; i >= 0; i--) {
      this.remove(this.floatingBubbles[toRemove[i]].mesh);
      this.floatingBubbles.splice(toRemove[i], 1);
    }
    if (toRemove.length) document.getElementById('hud-count').textContent = this.floatingBubbles.length;

    // Animate held bubble — gentle pulse + color cycle
    const heldHue = (now * 0.18) % 1;
    this.heldMat.color.setHSL(heldHue, 0.75, 0.65);
    this.heldMat.opacity = 0.3 + 0.08 * Math.sin(now * 2.8);
    this.heldRing.rotation.z += dt * 0.9;
    this.heldRing.rotation.x += dt * 0.4;

    // Pop ring animations
    for (let i = this.pops.length - 1; i >= 0; i--) {
      const p = this.pops[i];
      const t = (now - p.startTime) / 0.45;
      if (t >= 1) {
        this.remove(p.ring);
        this.remove(p.ring2);
        this.pops.splice(i, 1);
        continue;
      }
      p.ring.scale.setScalar(1 + t * 3.5);
      p.ringMat.opacity = 0.85 * (1 - t);
      p.ring2.scale.setScalar(1 + t * 5.0);
      p.ring2Mat.opacity = 0.6 * (1 - t * t);
    }

    // Auto-spawn ambient bubbles when scene has few
    if (this.floatingBubbles.length < 3 && Math.random() < 0.008) {
      this.spawnAmbientBubble();
    }
  }

  wireSimPanel() {
    const sl = document.getElementById('sim-pressure'), vl = document.getElementById('sim-pressure-val');
    sl.addEventListener('input', () => {
      const v = +sl.value; vl.textContent = v;
      this.handlePressure({ value: v, normalized: v / 100, timestamp: Date.now() });
    });
    document.querySelectorAll('#mudra-sim button[data-g]').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.g;
        mudra.send({ command: 'trigger_gesture', data: { type } });
        this.handleGesture({ type, confidence: 1.0, timestamp: Date.now() });
      });
    });
  }

  wireKeyboard() {
    let kbP = 0;
    window.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'Space':
          e.stopPropagation();
          mudra.send({ command: 'trigger_gesture', data: { type: 'tap' } });
          this.handleGesture({ type: 'tap', confidence: 1.0, timestamp: Date.now() });
          break;
        case 'KeyT':
          e.stopPropagation();
          mudra.send({ command: 'trigger_gesture', data: { type: 'twist' } });
          this.handleGesture({ type: 'twist', confidence: 1.0, timestamp: Date.now() });
          break;
        case 'BracketLeft':
          e.stopPropagation();
          kbP = Math.max(0, kbP - 10);
          this.handlePressure({ value: kbP, normalized: kbP / 100, timestamp: Date.now() });
          break;
        case 'BracketRight':
          e.stopPropagation();
          kbP = Math.min(100, kbP + 10);
          this.handlePressure({ value: kbP, normalized: kbP / 100, timestamp: Date.now() });
          break;
      }
    }, { capture: true });
  }

  applyBackground_gradient_sky() {
    const skyGeom = new THREE.SphereGeometry(80, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      uniforms: {
        topColor:    { value: new THREE.Color(0x0077ff) },
        bottomColor: { value: new THREE.Color(0xffaa44) },
      },
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorldPosition = wp.xyz;
          gl_Position = projectionMatrix * viewMatrix * wp;
        }`,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        varying vec3 vWorldPosition;
        void main() {
          float h = normalize(vWorldPosition).y;
          gl_FragColor = vec4(mix(bottomColor, topColor, smoothstep(-0.2, 0.8, h)), 1.0);
        }`,
      side: THREE.BackSide,
      depthWrite: false,
    });
    this.add(new THREE.Mesh(skyGeom, skyMat));
  }
}

document.addEventListener('DOMContentLoaded', () => {
  xb.add(new MainScript());
  xb.init(new xb.Options());
});
  </script>
</body>
</html>
