<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mudra Bubble Pop</title>
<style>
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  :root {
    --bg: #eaf6ff;
    --bg-grad-top: #cbe9ff;
    --bg-grad-bot: #ffe8f4;
    --card: #ffffff;
    --surface: rgba(255,255,255,0.85);
    --border: rgba(26,32,72,0.10);
    --text: #1a2040;
    --text-dim: #5a6282;
    --primary: #0099ff;
    --accent: #ff4fa3;
    --hot: #ffb300;
    --success: #1ec27a;
    --warning: #ff9100;
    --error: #ff3860;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg) 55%, var(--bg-grad-bot) 100%);
    color: var(--text);
    font-family: 'Poppins', 'Inter', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: none;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 18px;
    background: var(--surface);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 14px;
    flex-wrap: wrap;
    z-index: 30;
  }
  .header-left, .header-right { display: flex; align-items: center; gap: 12px; cursor: auto; }
  .brand { font-weight: 800; font-size: 15px; letter-spacing: 0.02em; }
  .brand span { color: var(--primary); }

  .conn-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--warning); transition: all 200ms; flex-shrink: 0; }
  .conn-dot.live { background: var(--success); box-shadow: 0 0 0 3px rgba(30,194,122,0.18); }
  .conn-label { font-size: 12px; color: var(--text-dim); }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat-val { font-size: 20px; font-weight: 800; color: var(--accent); }
  .stat-val.score { color: var(--primary); }
  .stat-val.combo { color: var(--hot); }
  .stat-lbl { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3px; font-weight: 600; }

  .lives { display: flex; gap: 3px; }
  .heart { width: 16px; height: 16px; color: var(--error); transition: all 250ms; }
  .heart.spent { opacity: 0.2; transform: scale(0.8); color: var(--text-dim); }

  /* ── Play area ── */
  .stage {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas#game { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* Crosshair */
  .crosshair {
    position: absolute;
    width: 46px; height: 46px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.05s linear;
    z-index: 10;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(255,79,163,0.6);
  }
  .crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  .crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }
  .crosshair .ring {
    position: absolute;
    inset: 25%;
    border: 2px solid var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(255,79,163,0.5);
  }
  .crosshair.charged .ring {
    border-color: var(--hot);
    box-shadow: 0 0 18px var(--hot), 0 0 30px rgba(255,179,0,0.5);
    animation: pulse-charge 0.6s ease-in-out infinite;
  }
  .crosshair.charged::before, .crosshair.charged::after {
    background: var(--hot);
    box-shadow: 0 0 10px var(--hot);
  }
  @keyframes pulse-charge {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* Banner */
  .banner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(36px, 9vw, 84px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 4px 20px rgba(255,79,163,0.3);
    z-index: 20;
    letter-spacing: -0.02em;
    pointer-events: none;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .banner.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

  /* Game over overlay */
  .game-over {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .game-over.show { opacity: 1; pointer-events: auto; cursor: auto; }
  .game-over h1 {
    font-size: clamp(40px, 8vw, 70px);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .game-over .final-score {
    font-size: 28px;
    color: var(--primary);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .game-over .hint { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 11px 28px;
    border-radius: 99px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 120ms, box-shadow 120ms;
    font-family: inherit;
    box-shadow: 0 6px 18px rgba(255,79,163,0.3);
  }
  .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(255,79,163,0.4); }

  /* ── Toolbar (pressure meter) ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 8px 18px;
    background: var(--surface);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    cursor: auto;
    z-index: 30;
  }
  .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 12px; }

  .meter { display: flex; align-items: center; gap: 8px; }
  .meter-lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
  .meter-bar { width: 140px; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .meter-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent), var(--hot)); border-radius: 99px; transition: width 60ms; width: 0%; }
  .meter-fill.charged { box-shadow: 0 0 12px var(--hot); }
  .meter-val { font-size: 11px; color: var(--text-dim); min-width: 34px; text-align: right; font-variant-numeric: tabular-nums; }

  .badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-weight: 600;
  }
  .badge.charged { background: var(--hot); color: #fff; border-color: transparent; animation: charged-pulse 0.8s ease-in-out infinite; }
  @keyframes charged-pulse { 0%,100% { opacity:1; } 50% { opacity: 0.75; } }

  /* ── Simulator strip ── */
  .sim-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(0,153,255,0.06);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    white-space: nowrap;
    cursor: auto;
    z-index: 30;
  }
  .sim-lbl {
    font-size: 10px;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    flex-shrink: 0;
  }
  .sim-group {
    display: flex;
    align-items: center;
    gap: 3px;
    padding-right: 10px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sim-group:last-child { border-right: none; }
  .sim-group-lbl {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 5px;
    font-weight: 600;
  }

  .btn, .sim-btn {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 11px;
    border-radius: 7px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all 120ms;
    white-space: nowrap;
    font-weight: 600;
  }
  .sim-btn { padding: 3px 9px; font-size: 10px; min-width: 26px; text-align: center; }
  .btn:hover, .sim-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,153,255,0.08); }
  .sim-btn:active { transform: scale(0.95); background: var(--primary); color: #fff; }

  .sim-slider { display: flex; align-items: center; gap: 6px; }
  .sim-slider input[type=range] { width: 90px; accent-color: var(--primary); }
  .sim-slider-val { font-size: 10px; color: var(--text-dim); min-width: 30px; font-variant-numeric: tabular-nums; }

  /* ── HUD ── */
  .hud {
    position: fixed;
    bottom: 64px; left: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 10px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    z-index: 100;
    line-height: 1.7;
    min-width: 150px;
    backdrop-filter: blur(8px);
    cursor: auto;
  }
  .hud-row { display: flex; justify-content: space-between; gap: 14px; }
  .hud-val { color: var(--text); font-weight: 600; }

  .mudra-badge {
    position: fixed;
    bottom: 10px; right: 14px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.7;
    pointer-events: none;
    z-index: 200;
    letter-spacing: 0.04em;
    font-weight: 600;
  }

  @media (max-width: 720px) {
    .hud { display: none; }
    .meter-bar { width: 80px; }
    .sim-slider input[type=range] { width: 60px; }
    .header { padding: 8px 12px; gap: 10px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="brand"><span>Mudra</span> Bubble Pop</div>
    <span class="conn-dot" id="connDot"></span>
    <span class="conn-label" id="connLabel">Connecting…</span>
  </div>
  <div class="header-right">
    <div class="stat"><div class="stat-val score" id="scoreVal">0</div><div class="stat-lbl">Score</div></div>
    <div class="stat"><div class="stat-val combo" id="comboVal">×1</div><div class="stat-lbl">Combo</div></div>
    <div class="stat">
      <div class="lives" id="lives">
        <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-9.5-8.6C.7 9.2 2.5 5 6.5 5c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3 4 0 5.8 4.2 4 7.4C19 16.65 12 21 12 21z"/></svg>
        <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-9.5-8.6C.7 9.2 2.5 5 6.5 5c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3 4 0 5.8 4.2 4 7.4C19 16.65 12 21 12 21z"/></svg>
        <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-9.5-8.6C.7 9.2 2.5 5 6.5 5c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3 4 0 5.8 4.2 4 7.4C19 16.65 12 21 12 21z"/></svg>
      </div>
      <div class="stat-lbl">Lives</div>
    </div>
  </div>
</div>

<!-- Stage -->
<div class="stage" id="stage">
  <canvas id="game"></canvas>
  <div class="crosshair" id="crosshair"><div class="ring"></div></div>
  <div class="banner" id="banner">POP!</div>
  <div class="game-over" id="gameOver">
    <h1>Game Over</h1>
    <div class="final-score">Score: <span id="finalScore">0</span></div>
    <button class="btn primary" id="restartBtn">Play Again</button>
    <div class="hint">or tap / press Space</div>
  </div>
</div>

<!-- Telemetry HUD -->
<div class="hud">
  <div class="hud-row"><span>Aim</span><span class="hud-val" id="hudAim">—</span></div>
  <div class="hud-row"><span>Gesture</span><span class="hud-val" id="hudGesture">—</span></div>
  <div class="hud-row"><span>Pressure</span><span class="hud-val" id="hudPres">0%</span></div>
  <div class="hud-row"><span>Bubbles</span><span class="hud-val" id="hudCount">0</span></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-left">
    <span class="badge" id="chargeBadge">⚡ Hold pressure &gt; 60% to charge</span>
  </div>
  <div class="toolbar-right">
    <div class="meter">
      <span class="meter-lbl">Power</span>
      <div class="meter-bar"><div class="meter-fill" id="presFill"></div></div>
      <span class="meter-val" id="presVal">0%</span>
    </div>
  </div>
</div>

<!-- Simulator strip -->
<div class="sim-strip">
  <span class="sim-lbl">Sim</span>

  <div class="sim-group">
    <span class="sim-group-lbl">Aim</span>
    <button class="sim-btn" data-n="up">&uarr;</button>
    <button class="sim-btn" data-n="down">&darr;</button>
    <button class="sim-btn" data-n="left">&larr;</button>
    <button class="sim-btn" data-n="right">&rarr;</button>
  </div>

  <div class="sim-group">
    <span class="sim-group-lbl">Gesture</span>
    <button class="sim-btn" data-g="tap">Tap</button>
    <button class="sim-btn" data-g="double_tap">2Tap</button>
    <button class="sim-btn" data-g="twist">Twist</button>
    <button class="sim-btn" data-g="double_twist">2Tw</button>
  </div>

  <div class="sim-group">
    <span class="sim-group-lbl">Pressure</span>
    <div class="sim-slider">
      <input type="range" id="simPressure" min="0" max="100" value="0">
      <span class="sim-slider-val" id="simPressureVal">0%</span>
    </div>
  </div>
</div>

<div class="mudra-badge">Powered by Mudra Band</div>

<script>
// ── Mock WebSocket ──────────────────────────────────────────────────────
class MudraWebSocket {
  constructor(url) {
    this._handlers = {};
    this._subscriptions = new Set();
    this._timers = [];
    this._useMock = false;
    try {
      this._ws = new WebSocket(url);
      this._ws.onopen    = (e) => { this._useMock = false; this._trigger('open', e); };
      this._ws.onmessage = (e) => this._trigger('message', e);
      this._ws.onclose   = (e) => this._trigger('close', e);
      this._ws.onerror   = ()  => { this._startMock(); };
    } catch (e) { this._startMock(); }
  }
  set onopen(fn)    { this._handlers.open    = fn; }
  set onmessage(fn) { this._handlers.message = fn; }
  set onclose(fn)   { this._handlers.close   = fn; }
  set onerror(fn)   { this._handlers.error   = fn; }
  _trigger(event, data) { if (this._handlers[event]) this._handlers[event](data); }
  _emit(payload) { this._trigger('message', { data: JSON.stringify(payload) }); }
  send(raw) {
    if (!this._useMock) { this._ws.send(raw); return; }
    const cmd = JSON.parse(raw);
    if (cmd.command === 'subscribe') this._subscriptions.add(cmd.signal);
    if (cmd.command === 'trigger_gesture') {
      this._emit({ type: 'gesture', data: { type: cmd.data.type, confidence: 0.99, timestamp: Date.now() }, timestamp: Date.now() });
    }
  }
  _startMock() {
    this._useMock = true;
    setTimeout(() => {
      this._trigger('open', {});
      this._emit({ type: 'connection_status', data: { status: 'connected', message: 'Mudra Companion ready (simulated)' }, timestamp: Date.now() });
    }, 100);
  }
  close() { this._timers.forEach(t => clearInterval(t)); if (!this._useMock && this._ws) this._ws.close(); }
}

// ── Canvas setup ────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
const crosshair = document.getElementById('crosshair');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = window.devicePixelRatio || 1;
  const rect = stage.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

// ── Game state ─────────────────────────────────────────────────────────
const state = {
  aim: { x: 0, y: 0 },
  bubbles: [],
  particles: [],
  score: 0,
  combo: 1,
  comboTimer: 0,
  lives: 3,
  pressure: 0,
  charged: false,
  spawnAcc: 0,
  spawnRate: 950,   // ms per spawn
  running: true,
  lastTime: 0,
};

const BUBBLE_COLORS = [
  { h: 200, s: 90, l: 65 },  // blue
  { h: 330, s: 85, l: 70 },  // pink
  { h: 280, s: 70, l: 72 },  // purple
  { h: 170, s: 70, l: 60 },  // teal
  { h: 45,  s: 95, l: 65 },  // yellow
  { h: 15,  s: 85, l: 65 },  // coral
];

function spawnBubble() {
  const r = 22 + Math.random() * 26;
  const color = BUBBLE_COLORS[Math.floor(Math.random() * BUBBLE_COLORS.length)];
  state.bubbles.push({
    x: r + Math.random() * (W - 2 * r),
    y: H + r + 10,
    r,
    vy: -(32 + Math.random() * 50 + state.score / 200),  // accelerate over time
    wobble: Math.random() * Math.PI * 2,
    wobbleRate: 0.02 + Math.random() * 0.03,
    color,
    popping: 0,
  });
}

function popBubble(b, bonus = 1) {
  if (b.popping) return false;
  b.popping = 1;
  // particles
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    state.particles.push({
      x: b.x,
      y: b.y,
      vx: Math.cos(a) * (60 + Math.random() * 40),
      vy: Math.sin(a) * (60 + Math.random() * 40),
      life: 0.6,
      maxLife: 0.6,
      color: b.color,
      r: 3 + Math.random() * 3,
    });
  }
  // score
  state.comboTimer = 2.2;
  state.combo = Math.min(state.combo + 1, 20);
  const gained = Math.round(10 * state.combo * bonus);
  state.score += gained;
  showBanner(bonus > 1 ? `POWER +${gained}!` : `+${gained}`);
  updateHUD();
  return true;
}

function showBanner(text) {
  const b = document.getElementById('banner');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(() => b.classList.remove('show'), 500);
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = state.score;
  document.getElementById('comboVal').textContent = '×' + state.combo;
  document.getElementById('hudCount').textContent = state.bubbles.length;
  const hearts = document.querySelectorAll('.heart');
  hearts.forEach((h, i) => h.classList.toggle('spent', i >= state.lives));
}

// ── Signal handlers (the single source of truth) ───────────────────────
function handleNavigation(data) {
  state.aim.x = Math.max(0, Math.min(W, state.aim.x + (data.delta_x || 0)));
  state.aim.y = Math.max(0, Math.min(H, state.aim.y + (data.delta_y || 0)));
  crosshair.style.left = state.aim.x + 'px';
  crosshair.style.top  = state.aim.y + 'px';
  document.getElementById('hudAim').textContent =
    Math.round(state.aim.x) + ',' + Math.round(state.aim.y);
}

function handleGesture(data) {
  const type = data.type || '';
  document.getElementById('hudGesture').textContent = type;
  if (!state.running) { if (type === 'tap' || type === 'double_tap') restart(); return; }
  if (type === 'tap')          doPop();
  if (type === 'double_tap')   doPop();       // same action; both feel natural
  if (type === 'twist')        doBomb();
  if (type === 'double_twist') doBomb();
}

function handlePressure(data) {
  state.pressure = Math.max(0, Math.min(1, data.normalized ?? (data.value / 100)));
  const pct = Math.round(state.pressure * 100);
  document.getElementById('presFill').style.width = pct + '%';
  document.getElementById('presVal').textContent = pct + '%';
  document.getElementById('hudPres').textContent = pct + '%';
  const wasCharged = state.charged;
  state.charged = state.pressure >= 0.6;
  if (state.charged !== wasCharged) {
    crosshair.classList.toggle('charged', state.charged);
    document.getElementById('presFill').classList.toggle('charged', state.charged);
    document.getElementById('chargeBadge').classList.toggle('charged', state.charged);
    document.getElementById('chargeBadge').textContent =
      state.charged ? '⚡ CHARGED — next tap is a power shot' : '⚡ Hold pressure > 60% to charge';
  }
}

// ── Actions ────────────────────────────────────────────────────────────
function doPop() {
  const ax = state.aim.x, ay = state.aim.y;
  let popped = 0;
  const radius = state.charged ? 110 : 0;
  const bonus = state.charged ? 2 : 1;

  // find closest bubble hit
  if (!state.charged) {
    // single closest-hit
    let best = null, bestDist = Infinity;
    for (const b of state.bubbles) {
      if (b.popping) continue;
      const dx = b.x - ax, dy = b.y - ay;
      const d = Math.hypot(dx, dy);
      if (d < b.r + 8 && d < bestDist) { best = b; bestDist = d; }
    }
    if (best && popBubble(best)) popped = 1;
  } else {
    // blast radius
    for (const b of state.bubbles) {
      if (b.popping) continue;
      const dx = b.x - ax, dy = b.y - ay;
      if (Math.hypot(dx, dy) <= radius + b.r) {
        if (popBubble(b, bonus)) popped++;
      }
    }
    if (popped > 0) state.charged = false;   // consume charge
  }
  if (popped === 0) { state.combo = 1; state.comboTimer = 0; updateHUD(); }
}

function doBomb() {
  // Pop every bubble currently on screen
  let popped = 0;
  for (const b of state.bubbles) if (popBubble(b, 1.5)) popped++;
  if (popped) showBanner('CLEAR!');
}

function loseLife() {
  state.lives--;
  state.combo = 1;
  updateHUD();
  if (state.lives <= 0) endGame();
}

function endGame() {
  state.running = false;
  document.getElementById('finalScore').textContent = state.score;
  document.getElementById('gameOver').classList.add('show');
}

function restart() {
  state.bubbles.length = 0;
  state.particles.length = 0;
  state.score = 0;
  state.combo = 1;
  state.comboTimer = 0;
  state.lives = 3;
  state.running = true;
  state.spawnAcc = 0;
  document.getElementById('gameOver').classList.remove('show');
  updateHUD();
}

// ── Game loop ──────────────────────────────────────────────────────────
function loop(t) {
  const dt = Math.min(0.05, (t - state.lastTime) / 1000 || 0);
  state.lastTime = t;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt) {
  if (!state.running) return;

  // spawn bubbles
  state.spawnAcc += dt * 1000;
  const rate = Math.max(350, state.spawnRate - state.score * 0.8);
  if (state.spawnAcc > rate) {
    state.spawnAcc = 0;
    spawnBubble();
  }

  // bubbles
  for (const b of state.bubbles) {
    if (b.popping) { b.popping += dt * 3.5; continue; }
    b.y += b.vy * dt;
    b.wobble += b.wobbleRate;
    b.x += Math.sin(b.wobble) * 0.25;
    if (b.y + b.r < 0) { b.popping = 999; loseLife(); }
  }
  // clean popped
  state.bubbles = state.bubbles.filter(b => b.popping < 2);

  // particles
  for (const p of state.particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 160 * dt;   // gravity
    p.life -= dt;
  }
  state.particles = state.particles.filter(p => p.life > 0);

  // combo timer
  state.comboTimer -= dt;
  if (state.comboTimer <= 0 && state.combo !== 1) {
    state.combo = 1;
    updateHUD();
  }
}

function drawBubble(b) {
  const alpha = b.popping ? Math.max(0, 1 - b.popping) : 1;
  const scale = b.popping ? 1 + b.popping * 0.3 : 1;
  const r = b.r * scale;
  const { h, s, l } = b.color;

  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.globalAlpha = alpha * 0.9;

  // main bubble
  const grad = ctx.createRadialGradient(-r * 0.35, -r * 0.35, r * 0.1, 0, 0, r);
  grad.addColorStop(0, `hsla(${h}, ${s}%, ${l + 15}%, 0.95)`);
  grad.addColorStop(0.6, `hsla(${h}, ${s}%, ${l}%, 0.6)`);
  grad.addColorStop(1, `hsla(${h}, ${s}%, ${l - 10}%, 0.35)`);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // rim
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = `hsla(${h}, ${s}%, ${l + 10}%, 0.7)`;
  ctx.stroke();

  // highlight
  ctx.globalAlpha = alpha * 0.9;
  ctx.beginPath();
  ctx.ellipse(-r * 0.35, -r * 0.45, r * 0.22, r * 0.14, -0.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fill();

  // tiny second highlight
  ctx.beginPath();
  ctx.arc(r * 0.3, r * 0.25, r * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  ctx.restore();
}

function drawParticle(p) {
  const a = Math.max(0, p.life / p.maxLife);
  const { h, s, l } = p.color;
  ctx.globalAlpha = a;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
  ctx.fillStyle = `hsl(${h}, ${s}%, ${l}%)`;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function render() {
  ctx.clearRect(0, 0, W, H);
  // draw bubbles behind, particles on top
  for (const b of state.bubbles) drawBubble(b);
  for (const p of state.particles) drawParticle(p);

  // charged aim ring overlay (world-space so it scales to game coords)
  if (state.charged && state.running) {
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.arc(state.aim.x, state.aim.y, 110, 0, Math.PI * 2);
    ctx.fillStyle = 'hsla(42, 100%, 60%, 0.5)';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'hsla(42, 100%, 50%, 0.9)';
    ctx.stroke();
    ctx.restore();
  }
}

// ── Mudra connection ───────────────────────────────────────────────────
const ws = new MudraWebSocket('ws://127.0.0.1:8766');

ws.onopen = () => {
  ws.send(JSON.stringify({ command: 'subscribe', signal: 'navigation' }));
  ws.send(JSON.stringify({ command: 'subscribe', signal: 'gesture' }));
  ws.send(JSON.stringify({ command: 'subscribe', signal: 'pressure' }));
};

ws.onmessage = (e) => {
  let msg; try { msg = JSON.parse(e.data); } catch { return; }
  if (msg.type === 'connection_status') {
    const ok = msg.data?.status === 'connected';
    document.getElementById('connDot').className = 'conn-dot' + (ok ? ' live' : '');
    document.getElementById('connLabel').textContent = ok ? 'Band Connected' : 'Simulated';
    return;
  }
  const d = msg.data || {};
  if (msg.type === 'navigation') handleNavigation(d);
  if (msg.type === 'gesture')    handleGesture(d);
  if (msg.type === 'pressure')   handlePressure(d);
};
ws.onclose = () => {
  document.getElementById('connDot').className = 'conn-dot';
  document.getElementById('connLabel').textContent = 'Simulated';
};
ws.onerror = ws.onclose;

// ── Simulator wiring ───────────────────────────────────────────────────
const NAV_STEP = 18;
document.querySelectorAll('.sim-btn[data-n]').forEach(btn => {
  btn.addEventListener('click', () => {
    const dir = btn.dataset.n;
    let dx = 0, dy = 0;
    if (dir === 'up')    dy = -NAV_STEP;
    if (dir === 'down')  dy = +NAV_STEP;
    if (dir === 'left')  dx = -NAV_STEP;
    if (dir === 'right') dx = +NAV_STEP;
    handleNavigation({ delta_x: dx, delta_y: dy, timestamp: Date.now() });
  });
});
document.querySelectorAll('.sim-btn[data-g]').forEach(btn => {
  btn.addEventListener('click', () => {
    ws.send(JSON.stringify({ command: 'trigger_gesture', data: { type: btn.dataset.g } }));
  });
});
const simPres = document.getElementById('simPressure');
const simPresVal = document.getElementById('simPressureVal');
simPres.addEventListener('input', () => {
  const v = parseInt(simPres.value, 10);
  simPresVal.textContent = v + '%';
  handlePressure({ value: v, normalized: v / 100, timestamp: Date.now() });
});

// ── Mouse fallback: move aim + click to pop ────────────────────────────
stage.addEventListener('mousemove', (e) => {
  const rect = stage.getBoundingClientRect();
  state.aim.x = e.clientX - rect.left;
  state.aim.y = e.clientY - rect.top;
  crosshair.style.left = state.aim.x + 'px';
  crosshair.style.top  = state.aim.y + 'px';
  document.getElementById('hudAim').textContent =
    Math.round(state.aim.x) + ',' + Math.round(state.aim.y);
});
stage.addEventListener('click', (e) => {
  if (e.target.closest('.game-over')) return;
  if (!state.running) return;
  doPop();
});

// ── Keyboard fallback ──────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space')      { e.preventDefault(); if (!state.running) restart(); else doPop(); }
  if (e.code === 'KeyB')       { doBomb(); }
  if (e.code === 'ArrowUp')    { e.preventDefault(); handleNavigation({ delta_x: 0, delta_y: -NAV_STEP }); }
  if (e.code === 'ArrowDown')  { e.preventDefault(); handleNavigation({ delta_x: 0, delta_y: +NAV_STEP }); }
  if (e.code === 'ArrowLeft')  { e.preventDefault(); handleNavigation({ delta_x: -NAV_STEP, delta_y: 0 }); }
  if (e.code === 'ArrowRight') { e.preventDefault(); handleNavigation({ delta_x: +NAV_STEP, delta_y: 0 }); }
});

// Restart button
document.getElementById('restartBtn').addEventListener('click', restart);

// ── Init ───────────────────────────────────────────────────────────────
resize();
state.aim.x = W / 2;
state.aim.y = H / 2;
crosshair.style.left = state.aim.x + 'px';
crosshair.style.top  = state.aim.y + 'px';
updateHUD();
requestAnimationFrame((t) => { state.lastTime = t; loop(t); });
</script>
</body>
</html>
